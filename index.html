  }).join("");
  const rqRows = (reqs || []).map((x) =>

    <div class="card red" style="margin-bottom:12px;">
      ${hourly
        ? `<div class="stub-row"><span class="l">Regular — ${n2(reg)} hrs × ${money(rate)}/hr</span><span class="v">${money(reg * rate)}</span></div>
           ${ot > 0 ? `<div class="stub-row"><span class="l">Overtime — ${n2(ot)} hrs × ${money(rate)} × ${r.ot_multiplier}</span><span class="v">${money(ot * rate * Number(r.ot_multiplier))}</span></div>` : ""}`
        : `<div class="stub-row"><span class="l">Salary</span><span class="v">${money(r.gross)}</span></div>`}
      <div class="stub-row"><span class="l">Gross pay</span><span class="v">${money(r.gross)}</span></div>
      <div class="stub-row"><span class="l">Tax withholding (${n2(r.tax_pct)}%)</span><span class="v red">−${money(r.tax)}</span></div>
      <div class="stub-row"><span class="l">Reimbursements (untaxed)</span><span class="v">+${money(r.reimbursements)}</span></div>
      <div class="stub-row"><span class="l">Per diem (untaxed)</span><span class="v">+${money(r.per_diem)}</span></div>
      <div class="stub-row bold"><span class="l">Net paid</span><span class="v">${money(r.net)}</span></div>
    </div>
    ${wkRows ? `<div class="lbl" style="margin-bottom:4px;">Weeks included</div><div class="card" style="padding:10px 14px;margin-bottom:12px;">${wkRows}</div>` : ""}
    ${rqRows ? `<div class="lbl" style="margin-bottom:4px;">Requests included</div><div class="card" style="padding:10px 14px;margin-bottom:12px;">${rqRows}</div>` : ""}
    <button class="btn ghost" onclick="closeModal()"><span>Close</span></button>

function payStub(p, x) {
  const rate = Number(p.rate || 0);
  const { mult } = otConf(p);
  let grossRows;
  if (p.pay_type === "hourly") {
    const reg = x.regHours ?? x.hours;
    grossRows = `<div class="stub-row"><span class="l">Regular — ${reg} hrs × ${money(rate)}/hr</span><span class="v">${money(reg * rate)}</span></div>`;
    if (x.otHours > 0) grossRows += `<div class="stub-row"><span class="l">Overtime — ${x.otHours} hrs × ${money(rate)} × ${mult}</span><span class="v">${money(x.otHours * rate * mult)}</span></div>`;
    grossRows += `<div class="stub-row"><span class="l">Gross pay</span><span class="v">${money(x.gross)}</span></div>`;
  } else {
    grossRows = `<div class="stub-row"><span class="l">Gross — salary × weeks approved</span><span class="v">${money(x.gross)}</span></div>`;
  }
  return `<div class="card red">
    ${grossRows}
    <div class="stub-row"><span class="l">Tax withholding (${p.tax_pct || 0}%)</span><span class="v red">−${money(x.tax)}</span></div>
    <div class="stub-row"><span class="l">Reimbursements + per diem (untaxed)</span><span class="v">+${money(x.reimb)}</span></div>
    <div class="stub-row bold"><span class="l">Net paycheck</span><span class="v">${money(x.net)}</span></div>
  </div>`;
}

async function approveSheet(id) {

}
async function declineSheet(id) {
  const reason = prompt("What needs fixing? (sent to the employee)");
  if (reason === null) return;
  const { error } = await sb.from("timesheets").update({ status: "declined", decline_reason: reason || "", decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);
  if (error) return fail(error); ping("Sent back to employee"); render();
}
/* Admins can walk a decision back while nothing's been paid on it. */
async function reopenWeek(id) {
  if (!confirm("Reopen this approved week?\n\nIt unlocks so the employee can edit and resubmit.")) return;
  const { error } = await sb.from("timesheets").update({ status: "draft", decline_reason: "Reopened by admin" }).eq("id", id);
  if (error) return fail(error);
  ping("Week reopened"); render();
}
async function undoReqDecision(id) {
  const { error } = await sb.from("requests").update({ status: "submitted", decided_at: null, decided_by: null }).eq("id", id);
  if (error) return fail(error);
  ping("Back in the queue"); render();
}
async function decideReq(id, status) {
  const { error } = await sb.from("requests").update({ status, decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);
  if (error) return fail(error); ping(status === "approved" ? "Approved" : "Declined"); render();
}
async function decideCR(id, sheetId, status) {
  const { error } = await sb.from("change_requests").update({ status, decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);
  if (error) return fail(error);
  if (status === "approved") {
    const { error: e2 } = await sb.from("timesheets").update({ status: "draft", decline_reason: "Reopened for changes" }).eq("id", sheetId);
    if (e2) return fail(e2);
    ping("Reopened for the employee");
  } else ping("Change request declined");
  render();
}

async function viewPayroll(v) {
  const { data: emps } = await sb.from("profiles").select("*").eq("role", "employee").eq("active", true).order("display_name");
  const [{ data: sheets }, { data: reqs }] = await Promise.all([
    sb.from("timesheets").select("*, time_entries(hours)").eq("status", "approved").eq("paid", false),
    sb.from("requests").select("*").eq("status", "approved").eq("paid", false),
  ]);

  let tot = { gross: 0, tax: 0, reimb: 0, net: 0 };
  const cards = (emps || []).map((u) => {
    const mySheets = (sheets || []).filter((s) => s.user_id === u.id);
    const myReqs = (reqs || []).filter((r) => r.user_id === u.id);
    const p = computePay(u, mySheets, myReqs);
    tot.gross += p.gross; tot.tax += p.tax; tot.reimb += p.reimb; tot.net += p.net;
    const empty = mySheets.length === 0 && myReqs.length === 0;
    const meta = u.pay_type === "hourly"
      ? `Hourly · ${money(Number(u.rate || 0))}/hr · ${u.tax_pct || 0}% tax`
      : `Salary · ${money(Number(u.salary_per_period || 0))}/wk · ${u.tax_pct || 0}% tax`;

        <div><div style="font-weight:700;font-size:16px;">${esc(u.display_name)}</div><div class="steel" style="font-size:13px;">${meta} · ${mySheets.length} wk approved</div></div>
        <button class="btn sm dark" ${empty ? "disabled" : ""} onclick="markPaid('${u.id}')"><span>Mark paid</span></button>
      </div>${empty ? '<div class="steel" style="font-size:14px;">Nothing approved for this run.</div>' : payStub(u, p)}</div>`;
  }).join("");

  v.innerHTML = `${sec("Pay run — approved & unpaid")}
    <div class="card" style="background:var(--ink);border-top:3px solid var(--red);color:#fff;">
      <div class="totals">
        <div><div class="k">Gross</div><div class="val">${money(tot.gross)}</div></div>
        <div><div class="k">Tax</div><div class="val">${money(tot.tax)}</div></div>
        <div><div class="k">Requests</div><div class="val">${money(tot.reimb)}</div></div>
        <div><div class="k">Net owed</div><div class="val">${money(tot.net)}</div></div>
      </div></div>
    ${cards || emptyBox("No active employees yet.")}`;
}
async function undoPayRun(runId, name) {
  if (!confirm(`Undo the last pay run for ${name}?\n\nThose weeks and requests go back to approved-and-unpaid. Do this only if the check hasn't gone out.`)) return;
  const { error } = await sb.rpc("undo_pay_run", { p_run: runId });
  if (error) return fail(error);
  ping("Pay run undone"); render();
}
async function markPaid(userId) {
  // One atomic call: snapshot the stub, then flag the items it covers.
  const { error } = await sb.rpc("create_pay_run", { p_user: userId });
  if (error) return fail(error);
  ping("Paid — stub recorded");
  render();
}

async function callFn(body) {
  const { data: sess } = await sb.auth.getSession();
  const res = await fetch(`${CFG.SUPABASE_URL}/functions/v1/create-crew-member`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${sess.session.access_token}`, "apikey": CFG.SUPABASE_ANON_KEY },
    body: JSON.stringify(body),
  });
  const out = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(out.error || "Request failed");
  return out;
}

let TEAM_PAYTYPE = "hourly";
let TEAM_FILTER = "all";
let TEAM_MEMBERS = new Map();

function formatHours(n) {
  return Number(n || 0).toLocaleString("en-US", { maximumFractionDigits: 2 });
}
function firstName(name) {
  return String(name || "").trim().split(/\s+/)[0] || "Account";
}
function initials(name) {
  return String(name || "?").trim().split(/\s+/).slice(0, 2).map((p) => p[0] || "").join("").toUpperCase() || "?";
}
function teamStatusInfo(sheet) {
  if (!sheet) return { filter: "draft", css: "draft", label: "Not started" };
  if (sheet.paid && sheet.status === "approved") return { filter: "approved", css: "paid", label: "Paid" };
  if (sheet.status === "submitted") return { filter: "submitted", css: "submitted", label: "Submitted" };
  if (sheet.status === "declined") return { filter: "declined", css: "declined", label: "Sent back" };
  if (sheet.status === "approved") return { filter: "approved", css: "approved", label: "Approved" };
  return { filter: "draft", css: "draft", label: "Draft" };
}
function setTeamFilter(filter) {
  TEAM_FILTER = filter;
  render();
}

async function viewTeam(v) {
  const currentWeek = mondayOf(todayISO());
  const [{ data: emps, error: empErr }, { data: sheets, error: sheetErr }] = await Promise.all([
    sb.from("profiles").select("*").eq("role", "employee").order("display_name"),
    sb.from("timesheets").select("*, time_entries(hours)").eq("week_start", currentWeek),
  ]);
  if (empErr) throw empErr;
  if (sheetErr) throw sheetErr;

  const employees = emps || [];
  TEAM_MEMBERS = new Map(employees.map((u) => [u.id, u]));
  const sheetByUser = new Map((sheets || []).map((s) => [s.user_id, s]));
  const cardData = employees.map((u) => {
    const sheet = sheetByUser.get(u.id) || null;
    const total = (sheet?.time_entries || []).reduce((sum, e) => sum + Number(e.hours || 0), 0);
    const status = teamStatusInfo(sheet);
    return { u, sheet, total, status };
  });

  const activeData = cardData.filter((x) => x.u.active);
  const counts = {
    all: cardData.length,
    draft: activeData.filter((x) => x.status.filter === "draft").length,
    submitted: activeData.filter((x) => x.status.filter === "submitted").length,
    declined: activeData.filter((x) => x.status.filter === "declined").length,
    approved: activeData.filter((x) => x.status.filter === "approved").length,
  };
  const filtered = TEAM_FILTER === "all" ? cardData : cardData.filter((x) => x.status.filter === TEAM_FILTER);

  const filters = [
    ["all", "All"],
    ["draft", "Draft"],
    ["submitted", "Submitted"],
    ["declined", "Sent back"],
    ["approved", "Approved"],
  ].map(([id, label]) => `<button type="button" class="team-filter ${TEAM_FILTER === id ? "on" : ""}" onclick="setTeamFilter('${id}')">${label}<span class="team-filter-count">${counts[id]}</span></button>`).join("");

  const cards = filtered.length ? filtered.map(({ u, sheet, total, status }) => {
    const meta = u.pay_type === "hourly" ? `Hourly · ${money(Number(u.rate || 0))}/hr` : `Salary · ${money(Number(u.salary_per_period || 0))}/wk`;
    const progress = Math.min(100, Math.max(0, (total / 40) * 100));
    const hoursClass = total > 40 ? "overtime" : total >= 40 ? "complete" : total > 0 ? "progress" : "zero";
    const hoursNote = total > 40
      ? `+${formatHours(total - 40)} hrs overtime`
      : total >= 40
        ? "40-hour target reached"
        : total > 0
          ? `${formatHours(40 - total)} hrs remaining`
          : "No time entered";
    const actionLabel = status.filter === "submitted" ? "Review timesheet" : "View timesheet";
    return `<article class="team-card ${status.css} ${u.active ? "" : "inactive"}">
      <div class="team-card-head">
        <div class="team-person">
          <div class="team-avatar" aria-hidden="true">${esc(initials(u.display_name))}</div>
          <div style="min-width:0;">
            <div class="team-name">${esc(u.display_name)} ${u.active ? "" : '<span class="steel" style="font-size:12px;">(inactive)</span>'}</div>
            <div class="team-meta">@${esc(u.username)} · ${meta}</div>
          </div>
        </div>
        <span class="team-status ${status.css}">${status.label}</span>
      </div>
      <div class="team-hours">
        <div>
          <div class="team-hours-label">Hours worked this week</div>
          <div class="team-hours-value ${hoursClass}">${formatHours(total)} <span>hrs</span></div>
        </div>
        <div class="team-hours-note ${hoursClass}">${hoursNote}</div>
      </div>
      <div class="team-progress ${hoursClass}" style="--progress:${progress}%"><span></span></div>
      <div class="team-card-actions">
        <button class="btn sm dark primary" onclick="openTeamTimesheet('${u.id}')"><span>${actionLabel}</span></button>
        <button class="btn sm ghost edit-member" onclick="openTeamMemberEdit('${u.id}')"><span>Edit</span></button>
      </div>
    </article>`;
  }).join("") : emptyBox("No employees match this filter.");

  const payField = TEAM_PAYTYPE === "hourly"
    ? `<label class="field"><div class="lbl">Rate ($/hr)</div><input id="t_rate" type="number" min="0" step="0.5" /></label>`
    : `<label class="field"><div class="lbl">Salary / week ($)</div><input id="t_sal" type="number" min="0" step="25" /></label>`;

  v.innerHTML = `<div class="team-toolbar">
      ${sec("Team", `<span class="steel" style="font-size:13px;">${employees.length} ${employees.length === 1 ? "employee" : "employees"} · ${weekRange(currentWeek)}</span>`)}
    </div>
    <div class="team-filters" role="group" aria-label="Filter employees by timesheet status">${filters}</div>
    <div class="team-grid">${cards}</div>
    <details class="team-add-panel">
      <summary>Add team member</summary>
      <div class="team-add-body">
        <div class="grid2">
          <label class="field"><div class="lbl">Display name</div><input id="t_name" placeholder="Full name" /></label>
          <label class="field"><div class="lbl">Username</div><input id="t_user" placeholder="lowercase, no spaces" /></label>
        </div>
        <label class="field"><div class="lbl">PIN (4–8 digits)</div><input id="t_pin" inputmode="numeric" placeholder="6 digits recommended" /></label>
        <div class="grid3">
          <label class="field"><div class="lbl">Pay type</div>
            <select id="t_type" onchange="TEAM_PAYTYPE=this.value; render()">
              <option value="hourly" ${TEAM_PAYTYPE === "hourly" ? "selected" : ""}>Hourly</option>
              <option value="salary" ${TEAM_PAYTYPE === "salary" ? "selected" : ""}>Salary</option>
            </select></label>
          ${payField}
          <label class="field"><div class="lbl">Tax withholding (%)</div><input id="t_tax" type="number" min="0" max="60" step="0.5" /></label>
        </div>
        <div id="t_err" class="err hidden"></div>
        <button class="btn" id="t_add"><span>Add team member</span></button>
      </div>
    </details>`;
  $("t_add").onclick = addCrew;
}

async function openTeamTimesheet(userId, weekStart = mondayOf(todayISO())) {
  const root = $("modal-root");
  root.innerHTML = `<div class="modal-bg"><div class="modal team-timesheet-modal"><div class="review-modal-body"><div class="spinner" style="min-height:240px;">Loading timesheet…</div></div></div></div>`;
  try {
    const [{ data: employee, error: employeeErr }, { data: sheets, error: sheetsErr }] = await Promise.all([
      sb.from("profiles").select("*").eq("id", userId).single(),
      sb.from("timesheets").select("*, time_entries(*)").eq("user_id", userId).order("week_start", { ascending: false }).limit(26),
    ]);
    if (employeeErr) throw employeeErr;
    if (sheetsErr) throw sheetsErr;

    const currentWeek = mondayOf(todayISO());
    const sheetMap = new Map((sheets || []).map((s) => [s.week_start, s]));
    const weeks = Array.from(new Set([currentWeek, ...(sheets || []).map((s) => s.week_start)])).sort().reverse();
    const selectedWeek = weeks.includes(weekStart) ? weekStart : currentWeek;
    const sheet = sheetMap.get(selectedWeek) || null;
    const entries = (sheet?.time_entries || []).slice().sort((a, b) => (a.work_date || "").localeCompare(b.work_date || "") || (a.created_at || "").localeCompare(b.created_at || ""));
    const total = entries.reduce((sum, e) => sum + Number(e.hours || 0), 0);
    const status = teamStatusInfo(sheet);
    const ot = Math.max(0, total - 40);

    const weekOptions = weeks.map((ws) => {
      const s = sheetMap.get(ws);
      const h = (s?.time_entries || []).reduce((sum, e) => sum + Number(e.hours || 0), 0);
      return `<option value="${ws}" ${ws === selectedWeek ? "selected" : ""}>${weekRange(ws)} · ${formatHours(h)} hrs</option>`;
    }).join("");

    const daySections = DAYS.map((dayName, index) => {
      const date = addDays(selectedWeek, index);
      const dayEntries = entries.filter((e) => e.work_date === date);
      const dayTotal = dayEntries.reduce((sum, e) => sum + Number(e.hours || 0), 0);
      const lines = dayEntries.length ? dayEntries.map((e) => `<div class="review-line">
        <div><div class="review-project">${esc(e.project) || "Untitled project"}</div><div class="review-notes">${esc(e.notes) || "No notes provided."}</div></div>
        <div class="review-line-hours">${formatHours(e.hours)} hrs</div>
      </div>`).join("") : `<div class="review-empty">No time logged</div>`;
      return `<section class="review-day">
        <div class="review-day-head"><div class="review-day-title">${dayName} · ${fmtDate(date)}</div><div class="review-day-total">${formatHours(dayTotal)} hrs</div></div>
        ${lines}
      </section>`;
    }).join("");

    const declineBanner = sheet?.status === "declined" && sheet.decline_reason
      ? `<div class="banner bad"><b>Sent back.</b> ${esc(sheet.decline_reason)}</div>`
      : "";
    const actionBar = sheet?.status === "submitted"
      ? `<div class="review-actions">
          <button class="btn ok" onclick="approveTeamTimesheet('${sheet.id}')"><span>Approve week</span></button>
          <button class="btn danger" onclick="sendBackTeamTimesheet('${sheet.id}')"><span>Send back</span></button>
        </div>`
      : "";

    root.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal team-timesheet-modal">
      <div class="review-modal-head">
        <div><div class="review-modal-title">${esc(employee.display_name)}</div><div class="review-modal-sub">Read-only timesheet review</div></div>
        <button type="button" class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
      </div>
      <div class="review-modal-body">
        <div class="review-week-row">
          <label class="field"><div class="lbl">Week</div><select onchange="openTeamTimesheet('${userId}',this.value)">${weekOptions}</select></label>
          <div class="review-total"><div class="k">Hours worked</div><div class="v">${formatHours(total)}</div></div>
          <div><span class="team-status ${status.css}">${status.label}</span></div>
        </div>
        ${ot ? `<div class="banner warn"><b>Overtime:</b> ${formatHours(ot)} hours above 40.</div>` : ""}
        ${declineBanner}
        <div class="review-days">${daySections}</div>
      </div>
      ${actionBar}
    </div></div>`;
  } catch (e) {
    fail(e);
    root.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal team-timesheet-modal"><div class="review-modal-head"><div class="review-modal-title">Timesheet unavailable</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="review-modal-body"><div class="banner bad">${esc(e.message || "Could not load this timesheet.")}</div></div></div></div>`;
  }
}

  closeModal();

}
async function sendBackTeamTimesheet(id) {
  const reason = prompt("What needs fixing?");
  if (reason === null) return;
  const { error } = await sb.from("timesheets").update({ status: "declined", decline_reason: reason.trim(), decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);
  if (error) return fail(error);
  closeModal();
  ping("Timesheet sent back");
  render();
}

async function addCrew() {
  const err = $("t_err"); const bad = (m) => { err.textContent = m; err.classList.remove("hidden"); };
  const body = {
    action: "create",
    display_name: $("t_name").value.trim(),
    username: $("t_user").value.trim().toLowerCase(),
    pin: $("t_pin").value.trim(),
    pay_type: TEAM_PAYTYPE,
    rate: TEAM_PAYTYPE === "hourly" ? Number($("t_rate")?.value || 0) : 0,
    salary_per_period: TEAM_PAYTYPE === "salary" ? Number($("t_sal")?.value || 0) : 0,
    tax_pct: Number($("t_tax").value || 0),
  };
  if (!body.display_name) return bad("Name required.");
  if (!/^[a-z0-9._-]{2,32}$/.test(body.username)) return bad("Username: 2–32 chars, a–z 0–9 . _ -");
  if (!/^\d{4,8}$/.test(body.pin)) return bad("PIN must be 4–8 digits.");
  $("t_add").disabled = true;
  try { await callFn(body); ping("Team member added"); render(); }
  catch (e) { bad(e.message); $("t_add").disabled = false; }
}

async function saveProfile(id) {

function togglePayFields() {
  const hourly = $("e_type")?.value === "hourly";
  const otOn = $("e_ot_on")?.value === "1";
  $("f_rate_wrap")?.classList.toggle("hidden", !hourly);
  $("f_sal_wrap")?.classList.toggle("hidden", hourly);
  $("ot_block")?.classList.toggle("hidden", !hourly);   // OT is hourly-only
  $("ot_fields")?.classList.toggle("hidden", !otOn);
}
async function savePay(id) {
  const err = $("e_err"); const bad = (m) => { err.textContent = m; err.classList.remove("hidden"); };
  const type = $("e_type").value;
  const tax = Number($("e_tax").value || 0);
  const thr = Number($("e_ot_thr").value || 40);
  const mult = Number($("e_ot_mult").value || 1.5);
  if (type === "hourly" && !(Number($("e_rate").value) > 0)) return bad("Enter an hourly rate.");
  if (type === "salary" && !(Number($("e_sal").value) > 0)) return bad("Enter a weekly salary.");
  if (!(tax >= 0 && tax <= 60)) return bad("Tax withholding must be between 0 and 60%.");
  if (!(thr >= 0 && thr <= 168)) return bad("OT threshold must be between 0 and 168 hrs.");
  if (!(mult >= 1 && mult <= 3)) return bad("OT multiplier must be between 1 and 3.");
  const payload = {
    pay_type: type,
    rate: Number($("e_rate").value || 0),
    salary_per_period: Number($("e_sal").value || 0),
    tax_pct: tax,
    ot_enabled: $("e_ot_on").value === "1",
    ot_threshold: thr,
    ot_multiplier: mult,
  };
  const { error } = await sb.from("profiles").update(payload).eq("id", id);
  if (error) return fail(error);
  closeModal(); ping("Pay updated"); render();
}
async function resetPin(id, name) {
  const pin = prompt(`New PIN for ${name} (4–8 digits):`);
  if (pin === null) return;
  if (!/^\d{4,8}$/.test(pin.trim())) return fail("PIN must be 4–8 digits.");
  try { await callFn({ action: "setpin", id, pin: pin.trim() }); ping("PIN reset"); }
  catch (e) { fail(e); }
}
async function toggleActive(id, active) {
  const { error } = await sb.from("profiles").update({ active: !active }).eq("id", id);
  if (error) return fail(error); ping(active ? "Disabled" : "Enabled"); render();
}

/* Whole-month ranges built without UTC math, so no off-by-one-day surprises. */
function presetRange(p) {
  const pad = (n) => String(n).padStart(2, "0");
  const iso = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
  const t = new Date(todayISO() + "T00:00:00");
  const y = t.getFullYear(), m = t.getMonth();
  const dim = (yy, mm) => new Date(yy, mm + 1, 0).getDate();
  switch (p) {
    case "this_week":  { const s = mondayOf(todayISO()); return [s, addDays(s, 6)]; }
    case "last_week":  { const s = addDays(mondayOf(todayISO()), -7); return [s, addDays(s, 6)]; }
    case "this_month": return [iso(y, m, 1), iso(y, m, dim(y, m))];
    case "last_month": { const py = m === 0 ? y - 1 : y, pm = m === 0 ? 11 : m - 1; return [iso(py, pm, 1), iso(py, pm, dim(py, pm))]; }
    case "this_quarter": { const q = Math.floor(m / 3); return [iso(y, q * 3, 1), iso(y, q * 3 + 2, dim(y, q * 3 + 2))]; }
    case "ytd": return [iso(y, 0, 1), todayISO()];
    default: return null;
  }
}

/* One fetch feeds every report. Weeks are pulled a little wide (-6 days) so a
   week that straddles the start of the range still contributes its days. */
async function reportData(from, to, who, approvedOnly) {
  let tsq = sb.from("timesheets")
    .select("*, time_entries(*)")
    .gte("week_start", addDays(from, -6)).lte("week_start", to);
  if (who !== "all") tsq = tsq.eq("user_id", who);
  if (approvedOnly) tsq = tsq.eq("status", "approved");

  let rq = sb.from("requests").select("*").gte("req_date", from).lte("req_date", to);
  if (who !== "all") rq = rq.eq("user_id", who);
  if (approvedOnly) rq = rq.eq("status", "approved");

  const [{ data: sheets, error: e1 }, { data: reqs, error: e2 }, { data: profs, error: e3 }] =
    await Promise.all([tsq, rq, sb.from("profiles").select("*")]);
  if (e1) throw e1; if (e2) throw e2; if (e3) throw e3;

  const P = new Map((profs || []).map((p) => [p.id, p]));
  return { sheets: sheets || [], reqs: reqs || [], P };
}

const nameOfId = (P, id) => P.get(id)?.display_name || "Unknown";
const projName = (s) => (s && s.trim()) ? s.trim() : "(No project)";
const n2 = (x) => Math.round(x * 100) / 100;

async function buildReport(type, from, to, who, approvedOnly, proj = "all") {
  const { sheets, reqs, P } = await reportData(from, to, who, approvedOnly);

  // Whole weeks (payroll/OT are weekly by definition)
  const weeks = sheets.filter((s) => s.week_start >= from && s.week_start <= to);
  // Individual days inside the range (detail/job costing are day-accurate)
  const lines = [];
  sheets.forEach((s) => (s.time_entries || []).forEach((e) => {
    if (e.work_date < from || e.work_date > to) return;
    if (proj !== "all" && e.project_id !== proj) return;
    lines.push({ ...e, sheet: s });
  }));

  if (type === "payroll") {
    const ids = new Set([...weeks.map((w) => w.user_id), ...reqs.map((r) => r.user_id)]);
    const rows = []; let T = { reg: 0, ot: 0, gross: 0, tax: 0, reimb: 0, net: 0 };
    [...ids].forEach((id) => {
      const p = P.get(id); if (!p) return;
      const mySheets = weeks.filter((w) => w.user_id === id);
      const myReqs = reqs.filter((r) => r.user_id === id);
      const x = computePay(p, mySheets, myReqs);          // same math the app pays on
      const reimb = myReqs.filter((r) => r.type === "reimbursement").reduce((a, r) => a + Number(r.amount), 0);
      const per = myReqs.filter((r) => r.type === "perdiem").reduce((a, r) => a + Number(r.amount), 0);
      if (!mySheets.length && !myReqs.length) return;
      rows.push([p.display_name, p.pay_type,
        p.pay_type === "hourly" ? n2(p.rate) : n2(p.salary_per_period),
        mySheets.length, n2(x.regHours), n2(x.otHours), n2(x.hours),
        n2(x.gross), n2(p.tax_pct), n2(x.tax), n2(reimb), n2(per), n2(x.net)]);
      T.reg += x.regHours; T.ot += x.otHours; T.gross += x.gross; T.tax += x.tax; T.reimb += x.reimb; T.net += x.net;
    });
    rows.sort((a, b) => String(a[0]).localeCompare(String(b[0])));
    return {
      headers: ["Employee", "Pay type", "Rate / salary", "Weeks", "Regular hrs", "OT hrs", "Total hrs",
        "Gross", "Tax %", "Tax withheld", "Reimbursements", "Per diem", "Net pay"],
      rows,
      money_cols: [7, 9, 10, 11, 12],
      stats: [{ k: "Employees", v: rows.length }, { k: "Total hours", v: n2(T.reg + T.ot) },
        { k: "Gross", v: money(T.gross), accent: "red" }, { k: "Net owed", v: money(T.net), accent: "ok" }],
      note: "Weeks are included by their start date, because overtime is calculated per week.",
    };
  }

  if (type === "detail") {
    const rows = lines.sort((a, b) => a.work_date < b.work_date ? -1 : 1).map((e) => {
      const idx = (new Date(e.work_date + "T00:00:00").getDay() + 6) % 7;
      const pr = e.project_id ? PROJ.get(e.project_id) : null;
      const cc = e.charge_code_id ? CODE.get(e.charge_code_id) : null;
      return [e.work_date, DAYS[idx], nameOfId(P, e.sheet.user_id), pr ? pr.number : "", projName(pr ? pr.name : e.project),
        cc ? cc.code : "", cc ? cc.tax_group : "", n2(e.hours),
        e.notes || "", e.sheet.week_start, e.sheet.status, e.sheet.paid ? "Yes" : "No"];
    });
    const tot = rows.reduce((a, r) => a + Number(r[7]), 0);
    return {
      headers: ["Date", "Day", "Employee", "Job #", "Project", "Code", "Tax group", "Hours", "Notes", "Week of", "Week status", "Paid"],
      rows,
      stats: [{ k: "Lines", v: rows.length }, { k: "Hours", v: n2(tot), accent: "red" },
        { k: "Employees", v: new Set(rows.map((r) => r[2])).size }],
    };
  }

  if (type === "jobcost") {
    const g = new Map();
    lines.forEach((e) => {
      const pr = e.project_id ? PROJ.get(e.project_id) : null;
      const k = pr ? pr.id : ("txt:" + projName(e.project));
      const p = P.get(e.sheet.user_id);
      const rec = g.get(k) || {
        num: pr ? pr.number : "—", name: pr ? pr.name : projName(e.project),
        client: pr ? (pr.client || "") : "", hrs: 0, cost: 0, people: new Set(), n: 0,
      };
      rec.hrs += Number(e.hours || 0);
      rec.cost += Number(e.hours || 0) * Number(p?.rate || 0);   // hourly base rate
      rec.people.add(e.sheet.user_id); rec.n++;
      g.set(k, rec);
    });
    const all = [...g.values()].sort((a, b) => b.hrs - a.hrs);
    const totH = all.reduce((a, r) => a + r.hrs, 0);
    const rows = all.map((r) => [r.num, r.name, r.client, r.people.size, r.n, n2(r.hrs),
      totH ? n2(r.hrs / totH * 100) + "%" : "0%", n2(r.cost)]);
    const totC = all.reduce((a, r) => a + r.cost, 0);
    return {
      headers: ["Job #", "Project", "Client", "Employees", "Entries", "Hours", "% of hours", "Labor cost"],
      rows, money_cols: [7],
      stats: [{ k: "Projects", v: rows.length }, { k: "Hours", v: n2(totH) },
        { k: "Labor cost", v: money(totC), accent: "red" }],
      note: "Labor cost uses each employee's hourly rate. Salaried crew show no labor cost — they have no hourly rate — and the overtime premium isn't split across projects; see the Overtime report for that.",
    };
  }

  if (type === "chargecode") {
    const g = new Map();
    lines.forEach((e) => {
      const cc = e.charge_code_id ? CODE.get(e.charge_code_id) : null;
      const k = cc ? cc.id : "none";
      const p = P.get(e.sheet.user_id);
      const rec = g.get(k) || {
        code: cc ? cc.code : "—", name: cc ? cc.name : "(No work type)",
        group: cc ? (cc.tax_group || "—") : "—", bill: cc ? cc.billable : false,
        hrs: 0, cost: 0, n: 0,
      };
      rec.hrs += Number(e.hours || 0);
      rec.cost += Number(e.hours || 0) * Number(p?.rate || 0);
      rec.n++;
      g.set(k, rec);
    });
    const all = [...g.values()].sort((a, b) => b.hrs - a.hrs);
    const totH = all.reduce((a, r) => a + r.hrs, 0);
    const totC = all.reduce((a, r) => a + r.cost, 0);
    const rows = all.map((r) => [r.code, r.name, r.group, r.bill ? "Billable" : "Non-billable",
      r.n, n2(r.hrs), totH ? n2(r.hrs / totH * 100) + "%" : "0%", n2(r.cost)]);
    const groups = [...new Set(all.map((r) => r.group))].length;
    return {
      headers: ["Code", "Work type", "Tax group", "Billable", "Entries", "Hours", "% of hours", "Labor cost"],
      rows, money_cols: [7],
      stats: [{ k: "Work types", v: rows.length }, { k: "Tax groups", v: groups },
        { k: "Hours", v: n2(totH) }, { k: "Labor cost", v: money(totC), accent: "red", small: true }],
      note: "Cost uses each person's hourly rate; salaried crew show no cost, and the overtime premium isn't split across codes. The tax-group labels are the ones you set on the Codes tab — check them with your accountant before filing anything off this.",
    };
  }

  if (type === "overtime") {
    const rows = []; let totOt = 0, totPrem = 0;
    weeks.forEach((w) => {
      const p = P.get(w.user_id); if (!p || p.pay_type !== "hourly") return;
      const { on, threshold, mult } = otConf(p);
      if (!on) return;
      const hrs = (w.time_entries || []).reduce((a, e) => a + Number(e.hours || 0), 0);
      const ot = Math.max(0, hrs - threshold);
      if (ot <= 0) return;
      const otPay = ot * Number(p.rate || 0) * mult;
      const premium = ot * Number(p.rate || 0) * (mult - 1);
      totOt += ot; totPrem += premium;
      rows.push([p.display_name, w.week_start, addDays(w.week_start, 6), n2(hrs), n2(threshold),
        n2(ot), mult + "×", n2(p.rate), n2(otPay), n2(premium), w.status]);
    });
    rows.sort((a, b) => a[1] < b[1] ? 1 : -1);
    return {
      headers: ["Employee", "Week start", "Week end", "Total hrs", "OT after", "OT hrs", "Multiplier",
        "Base rate", "OT pay", "Extra vs base", "Status"],
      rows, money_cols: [8, 9],
      stats: [{ k: "Weeks with OT", v: rows.length }, { k: "OT hours", v: n2(totOt), accent: "warn" },
        { k: "Premium paid", v: money(totPrem), accent: "warn" }],
      note: "“Extra vs base” is what the overtime multiplier added on top of straight time.",
    };
  }

  if (type === "requests") {
    const rows = reqs.sort((a, b) => a.req_date < b.req_date ? 1 : -1).map((r) => [
      r.req_date, nameOfId(P, r.user_id), r.type === "perdiem" ? "Per diem" : "Reimbursement",
      n2(r.amount), r.status, r.paid ? "Yes" : "No",
      r.type === "perdiem" ? "n/a" : ((r.receipt_paths || []).length ? `${r.receipt_paths.length}` : "MISSING"),
      r.notes || "",
    ]);
    const reimb = reqs.filter((r) => r.type === "reimbursement");
    const missing = reimb.filter((r) => !(r.receipt_paths || []).length).length;
    return {
      headers: ["Date", "Employee", "Type", "Amount", "Status", "Paid", "Receipts", "Notes"],
      rows, money_cols: [3],
      stats: [{ k: "Requests", v: rows.length },
        { k: "Total", v: money(reqs.reduce((a, r) => a + Number(r.amount), 0)), accent: "red" },
        { k: "Missing receipts", v: missing, accent: missing ? "warn" : "" }],
    };
  }
  throw new Error("Unknown report type");
}

async function runReport() {
  const type = $("rp_type").value, from = $("rp_from").value, to = $("rp_to").value;
  const who = $("rp_user").value, approvedOnly = $("rp_approved").value === "1";
  const proj = $("rp_project")?.value || "all";
  const out = $("report-out");
  if (!from || !to) return fail("Pick a date range.");
  if (from > to) return fail("The start date is after the end date.");
  out.innerHTML = skeleton();
  try {
    const R = await buildReport(type, from, to, who, approvedOnly, proj);
    REPORT_LAST = { ...R, type, from, to };
    out.innerHTML = renderReport(REPORT_LAST);
  } catch (e) {
    fail(e);
    out.innerHTML = `<div class="banner bad">Could not build that report. ${esc(e.message || "")}</div>`;
  }
}

const RPT_PREVIEW = 100;
function renderReport(R) {
  if (!R.rows.length) return `<div class="empty">Nothing matched that range. Try widening the dates, or switch “Approved only” to Everything.</div>`;
  const shown = R.rows.slice(0, RPT_PREVIEW);
  const isMoney = (i) => (R.money_cols || []).includes(i);
  const body = shown.map((r) => `<tr>${r.map((c, i) =>
    `<td class="${isMoney(i) ? "num" : (typeof c === "number" ? "num" : "")}">${isMoney(i) ? money(Number(c)) : esc(c)}</td>`).join("")}</tr>`).join("");
  return `
    ${statCards(R.stats.map((s) => ({ k: s.k, v: s.v, accent: s.accent || "", small: typeof s.v === "string" && s.v.length > 7 })))}
    ${R.note ? `<div class="banner warn rpt-note">${R.note}</div>` : ""}
    <div class="rpt-head">
      <div class="steel" style="font-size:13px;">${R.rows.length} row${R.rows.length === 1 ? "" : "s"} · ${fmtDate(R.from)} – ${fmtDate(R.to)}${R.rows.length > RPT_PREVIEW ? ` · showing first ${RPT_PREVIEW}` : ""}</div>
      <button class="btn sm dark" onclick="exportReport()"><span>Export CSV</span></button>
    </div>
    <div class="rpt-scroll">
      <table class="rpt-table">
        <thead><tr>${R.headers.map((x) => `<th>${esc(x)}</th>`).join("")}</tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>
    ${R.rows.length > RPT_PREVIEW ? `<div class="steel" style="font-size:13px;margin-top:8px;">The table preview is capped at ${RPT_PREVIEW} rows — the CSV export has all ${R.rows.length}.</div>` : ""}`;
}

/* RFC-4180 escaping + a BOM so Excel opens UTF-8 correctly. */
function toCSV(headers, rows) {
  const cell = (v) => {
    const s = v == null ? "" : String(v);
    return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  return "\ufeff" + [headers, ...rows].map((r) => r.map(cell).join(",")).join("\r\n");
}
function exportReport() {
  const R = REPORT_LAST;
  if (!R || !R.rows.length) return fail("Run a report first.");
  const csv = toCSV(R.headers, R.rows);
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `siete-${R.type}_${R.from}_to_${R.to}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  ping("CSV exported");
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".week-selector")) closeWeekMenu();
  if (!e.target.closest(".entrysummary")) closeEntryMenus();
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeWeekMenu(); closeEntryMenus(); } });
boot();
