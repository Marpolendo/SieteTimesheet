<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SIETE · Crew Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,700;0,800;1,700;1,800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --red:#C4222B; --red-dark:#8E151C; --ink:#16181A; --steel:#6E7275;
    --line:#E3E1DD; --bg:#F4F3F0; --card:#FFFFFF; --ok:#1E7B3C; --warn:#B07A00;
  }
  *{box-sizing:border-box; border-radius:0;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:'Barlow',sans-serif; -webkit-font-smoothing:antialiased;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{width:100%; border:2px solid var(--line); padding:9px 10px;
    font-family:'Barlow',sans-serif; font-size:15px; color:var(--ink); background:#fff; outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--ink);}
  textarea{min-height:56px; resize:vertical;}
  .hidden{display:none !important;}

  .wm .a{font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; letter-spacing:.02em; color:var(--red);}
  .wm .b{font-family:'Barlow Condensed',sans-serif; font-weight:500; letter-spacing:.42em; color:#9A9DA0; text-transform:uppercase; margin-top:2px;}

  .btn{border:2px solid var(--red); background:var(--red); color:#fff; font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:16px; letter-spacing:.08em; text-transform:uppercase; padding:10px 22px;
    transform:skewX(-10deg); transition:filter .15s;}
  .btn>span{display:inline-block; transform:skewX(10deg);}
  .btn:hover{filter:brightness(.88);}
  .btn.sm{font-size:14px; padding:5px 14px;}
  .btn.dark{background:var(--ink); border-color:var(--ink);}
  .btn.ok{background:var(--ok); border-color:var(--ok);}
  .btn.ghost{background:transparent; color:var(--ink); border-color:var(--ink);}
  .btn.danger{background:transparent; color:var(--red); border-color:var(--red);}
  .btn[disabled]{opacity:.45; cursor:not-allowed; filter:none;}
  .btn.full{width:100%;}

  .chip{display:inline-block; transform:skewX(-10deg); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:12px; letter-spacing:.08em; padding:2px 10px;}
  .chip>span{display:inline-block; transform:skewX(10deg);}
  .chip.draft{background:#EEF0F1; color:var(--steel);}
  .chip.submitted{background:#FFF4DB; color:var(--warn);}
  .chip.approved{background:#E2F2E6; color:var(--ok);}
  .chip.declined{background:#FBE3E4; color:var(--red);}
  .chip.paid{background:#EAEAEA; color:var(--steel);}

  .field{display:block; margin-bottom:14px;}
  .field .lbl{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:.12em;
    color:var(--steel); text-transform:uppercase; margin-bottom:4px;}
  .field .hint{font-size:12px; color:var(--steel); margin-top:3px;}

  .card{background:var(--card); border:1px solid var(--line); border-top:3px solid var(--ink); padding:18px; margin-bottom:16px;}
  .card.thin{border-top:3px solid var(--line); padding:14px;}
  .card.red{border-top:3px solid var(--red);}

  .sec-title{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; gap:12px;}
  .sec-title h2{font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; font-size:24px;
    text-transform:uppercase; letter-spacing:.02em; margin:0;}
  .sec-title h2 .slash{color:var(--red);}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  .row{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .steel{color:var(--steel);}
  .err{color:var(--red); font-size:13px; margin-bottom:10px;}
  .empty{border:2px dashed var(--line); padding:24px 18px; text-align:center; color:var(--steel); font-size:14px; margin-bottom:16px;}

  header{background:var(--ink); padding:14px 18px;}
  .head-in{max-width:900px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;}
  .head-left{display:flex; align-items:center; gap:14px;}
  .head-tag{border-left:2px solid var(--red); padding-left:12px; font-family:'Barlow Condensed',sans-serif;
    font-style:italic; font-weight:700; font-size:16px; letter-spacing:.14em; color:#fff;}
  .signout{background:none; border:none; color:#9A9DA0; font-family:'Barlow Condensed',sans-serif;
    font-size:13px; letter-spacing:.1em; text-transform:uppercase; padding:0;}
  .tabs{background:#fff; border-bottom:1px solid var(--line);}
  .tabs-in{max-width:900px; margin:0 auto; display:flex;}
  .tab{background:none; border:none; border-bottom:3px solid transparent; padding:12px 18px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--steel);}
  .tab.active{border-bottom-color:var(--red); color:var(--ink);}
  .tab .badge{margin-left:7px; background:var(--red); color:#fff; font-size:12px; padding:1px 7px;}
  main{max-width:900px; margin:0 auto; padding:22px 18px 70px;}

  .weeknav{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
  .weeknav .wk{font-family:'Barlow Condensed',sans-serif; font-weight:800; font-style:italic; font-size:22px; text-transform:uppercase;}
  .weeknav .sub{font-size:13px; color:var(--steel);}
  .navbtn{border:2px solid var(--ink); background:#fff; color:var(--ink); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:15px; letter-spacing:.06em; text-transform:uppercase; padding:6px 14px; transform:skewX(-10deg);}
  .navbtn>span{display:inline-block; transform:skewX(10deg);}
  .navbtn[disabled]{opacity:.4; cursor:not-allowed;}

  .day{border:1px solid var(--line); border-left:3px solid var(--red); padding:12px; margin-bottom:12px; background:#fff;}
  .day h4{margin:0 0 8px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px;
    letter-spacing:.08em; text-transform:uppercase;}
  .entry{display:grid; grid-template-columns:1.4fr .8fr 2fr auto; gap:8px; align-items:start; margin-bottom:8px;}
  .entry .x{border:2px solid var(--line); background:#fff; color:var(--steel); font-weight:700; padding:0 12px; height:40px;}
  .entry .x:hover{border-color:var(--red); color:var(--red);}
  .addrow{border:2px dashed var(--line); background:#fff; color:var(--steel); width:100%; padding:8px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.08em; text-transform:uppercase;}

  .seg{display:flex; gap:8px; margin-bottom:14px;}
  .seg button{flex:1; padding:9px 0; border:2px solid var(--line); background:#fff; color:var(--steel);
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; letter-spacing:.08em; text-transform:uppercase;}
  .seg button.on{border-color:var(--ink); background:var(--ink); color:#fff;}

  .stub-row{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line);}
  .stub-row .l{font-size:14px; color:var(--steel);}
  .stub-row .v{font-family:'JetBrains Mono',monospace; font-weight:500; font-size:14px;}
  .stub-row.bold .l{color:var(--ink); font-weight:700;}
  .stub-row.bold .v{font-weight:700; font-size:18px;}
  .v.red{color:var(--red);}

  .banner{padding:12px 14px; margin-bottom:14px; border:1px solid var(--line); font-size:14px;}
  .banner.warn{background:#FFF6E0; border-color:#EACB7A;}
  .banner.bad{background:#FBE3E4; border-color:#E9B4B7;}
  .banner.good{background:#E6F3EA; border-color:#AFD8BB;}

  .totals{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; text-align:center;}
  .totals .k{font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:.14em; color:#9A9DA0; text-transform:uppercase;}
  .totals .val{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; margin-top:3px;}

  .modal-bg{position:fixed; inset:0; background:rgba(22,24,26,.55); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50;}
  .modal{background:#fff; max-width:440px; width:100%; border-top:4px solid var(--red); padding:20px;}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) skewX(-10deg); background:var(--ink); color:#fff;
    padding:10px 22px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.08em; font-size:15px;
    box-shadow:0 4px 14px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:opacity .2s; z-index:60;}
  .toast.show{opacity:1;}
  .toast.bad{background:var(--red-dark);}
  .toast>span{display:inline-block; transform:skewX(10deg);}

  .spinner{min-height:100vh; display:grid; place-items:center;}

  @media (max-width:600px){
    .grid3{grid-template-columns:1fr;}
    .totals{grid-template-columns:1fr 1fr;}
    .entry{grid-template-columns:1fr 1fr;}
    .entry .notes{grid-column:1 / -1;}
    .head-tag{display:none;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body>

<div id="boot" class="spinner"><div class="wm"><div class="a" style="font-size:44px;">SIETE</div><div class="b" style="font-size:14px;">Land &amp; Concrete</div></div></div>

<!-- LOGIN -->
<div id="login" class="hidden" style="min-height:100vh; background:var(--ink);">
  <div style="max-width:380px; margin:0 auto; padding:70px 20px;">
    <div style="margin-bottom:34px;">
      <div class="wm"><div class="a" style="font-size:52px;">SIETE</div><div class="b" style="font-size:17px;">Land &amp; Concrete</div></div>
      <div style="margin-top:14px; font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:700; font-size:19px; letter-spacing:.16em; color:#fff;">CREW LEDGER</div>
      <div style="color:#9A9DA0; font-size:14px; margin-top:6px;">Time, requests, and payroll — one book.</div>
    </div>
    <div style="background:#fff; padding:22px; border-top:4px solid var(--red);">
      <label class="field"><div class="lbl">Account</div><select id="loginUser"></select></label>
      <label class="field"><div class="lbl">PIN</div>
        <input id="loginPin" type="password" inputmode="numeric" placeholder="••••••" />
      </label>
      <div id="loginErr" class="err hidden"></div>
      <button class="btn full" id="loginBtn"><span>Clock in</span></button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header><div class="head-in">
    <div class="head-left">
      <div class="wm"><div class="a" style="font-size:28px;">SIETE</div><div class="b" style="font-size:9px;">Land &amp; Concrete</div></div>
      <div class="head-tag">CREW LEDGER</div>
    </div>
    <div style="text-align:right;">
      <div id="meName" style="color:#fff; font-weight:600; font-size:14px;"></div>
      <div style="display:flex; gap:14px; justify-content:flex-end;">
        <button class="signout" id="changepin">Change PIN</button>
        <button class="signout" id="signout">Sign out</button>
      </div>
    </div>
  </div></header>
  <div class="tabs"><div id="tabs" class="tabs-in"></div></div>
  <main id="view"></main>
</div>

<div id="modal-root"></div>
<div id="toast" class="toast"><span></span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
/* ============================================================
   SIETE Crew Ledger — Supabase-backed client
   ============================================================ */
const CFG = window.SIETE_CONFIG || {};
const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);

let ME = null;     // profile row
let TAB = null;
let WEEK = null;   // employee: current week_start (Monday, YYYY-MM-DD)

/* ---------- utils ---------- */
const $ = (id) => document.getElementById(id);
const money = (n) => (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

function mondayOf(d) {
  const t = new Date(d + "T00:00:00");
  const day = (t.getDay() + 6) % 7; // Mon=0
  t.setDate(t.getDate() - day);
  return t.toISOString().slice(0, 10);
}
function addDays(iso, n) { const t = new Date(iso + "T00:00:00"); t.setDate(t.getDate() + n); return t.toISOString().slice(0, 10); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) { if (!iso) return "—"; const [y, m, d] = iso.split("-"); return `${m}/${d}/${y.slice(2)}`; }
function weekLabel(ws) { return `Week of ${fmtDate(ws)}`; }
function weekRange(ws) { return `${fmtDate(ws)} – ${fmtDate(addDays(ws, 6))}`; }

let toastTimer;
function ping(msg, bad) {
  const t = $("toast"); t.querySelector("span").textContent = msg;
  t.className = "toast show" + (bad ? " bad" : "");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => (t.className = "toast"), 2800);
}
function fail(e) { ping(typeof e === "string" ? e : (e?.message || "Something went wrong"), true); }

/* ---------- payroll math (weekly) ---------- */
function computePay(profile, sheets, reqs) {
  const hours = sheets.reduce((s, ts) => s + (ts.time_entries || []).reduce((a, e) => a + Number(e.hours || 0), 0), 0);
  const gross = profile.pay_type === "hourly"
    ? hours * Number(profile.rate || 0)
    : sheets.length * Number(profile.salary_per_period || 0);
  const tax = gross * (Number(profile.tax_pct || 0) / 100);
  const reimb = reqs.reduce((s, r) => s + Number(r.amount || 0), 0);
  return { hours, gross, tax, reimb, net: gross - tax + reimb };
}

/* ============================================================
   AUTH
   ============================================================ */
async function boot() {
  if (!CFG.SUPABASE_URL || CFG.SUPABASE_URL.includes("YOUR-PROJECT")) {
    $("boot").innerHTML = '<div style="max-width:360px;text-align:center;color:var(--steel);font-size:14px;">Add your Supabase URL and anon key to <b>config.js</b>, then reload.</div>';
    return;
  }
  const { data } = await sb.auth.getSession();
  if (data.session) { await afterLogin(); }
  else { await showLogin(); }
}

async function showLogin() {
  $("boot").classList.add("hidden");
  $("app").classList.add("hidden");
  $("login").classList.remove("hidden");
  const sel = $("loginUser");
  sel.innerHTML = '<option>Loading…</option>';
  const { data, error } = await sb.rpc("list_usernames");
  if (error) { sel.innerHTML = '<option>Could not load accounts</option>'; return; }
  sel.innerHTML = (data || []).map((u) =>
    `<option value="${esc(u.username)}">${esc(u.display_name)} — ${u.role === "admin" ? "Admin" : "Crew"}</option>`).join("");
}

async function doLogin() {
  const username = $("loginUser").value;
  const pin = $("loginPin").value.trim();
  const err = $("loginErr");
  err.classList.add("hidden");
  if (!username || !pin) { err.textContent = "Pick an account and enter your PIN."; err.classList.remove("hidden"); return; }
  const email = `${username}@${CFG.EMAIL_DOMAIN}`;
  $("loginBtn").disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pin });
  $("loginBtn").disabled = false;
  if (error) { err.textContent = "Wrong PIN, or account not found."; err.classList.remove("hidden"); return; }
  $("loginPin").value = "";
  await afterLogin();
}

async function afterLogin() {
  const { data: sess } = await sb.auth.getSession();
  const uid = sess.session.user.id;
  const { data: prof, error } = await sb.from("profiles").select("*").eq("id", uid).single();
  if (error || !prof) { await sb.auth.signOut(); return showLogin(); }
  ME = prof;
  TAB = ME.role === "admin" ? "approvals" : "week";
  WEEK = mondayOf(todayISO());
  $("boot").classList.add("hidden");
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("meName").textContent = ME.display_name;
  await render();
}

async function signOut() { await sb.auth.signOut(); ME = null; showLogin(); }

/* ---------- self-service PIN change (any signed-in user) ---------- */
function openPinChange() {
  const email = `${ME.username}@${CFG.EMAIL_DOMAIN}`;
  $("modal-root").innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="sec-title"><h2><span class="slash">/</span> Change PIN</h2></div>
        <p class="steel" style="font-size:14px;margin-top:0;">Optional — leave it as is if you'd rather not.</p>
        <label class="field"><div class="lbl">Current PIN</div>
          <input id="pc_old" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <label class="field"><div class="lbl">New PIN (4–8 digits)</div>
          <input id="pc_new" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <label class="field"><div class="lbl">Confirm new PIN</div>
          <input id="pc_new2" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <div id="pc_err" class="err hidden"></div>
        <div style="display:flex;gap:10px;">
          <button class="btn" id="pc_save"><span>Update PIN</span></button>
          <button class="btn ghost" onclick="closeModal()"><span>Cancel</span></button>
        </div>
      </div>
    </div>`;
  $("pc_save").onclick = () => savePinChange(email);
}
async function savePinChange(email) {
  const oldPin = $("pc_old").value.trim();
  const newPin = $("pc_new").value.trim();
  const conf = $("pc_new2").value.trim();
  const err = $("pc_err"); const bad = (m) => { err.textContent = m; err.classList.remove("hidden"); };
  if (!/^\d{4,8}$/.test(newPin)) return bad("New PIN must be 4–8 digits.");
  if (newPin !== conf) return bad("New PINs don't match.");
  if (newPin === oldPin) return bad("New PIN is the same as the old one.");
  $("pc_save").disabled = true;
  // verify the current PIN by re-authenticating (updateUser doesn't check it)
  const { error: reauth } = await sb.auth.signInWithPassword({ email, password: oldPin });
  if (reauth) { $("pc_save").disabled = false; return bad("Current PIN is wrong."); }
  const { error } = await sb.auth.updateUser({ password: newPin });
  if (error) { $("pc_save").disabled = false; return bad(error.message); }
  closeModal(); ping("PIN updated");
}

/* ============================================================
   SHELL
   ============================================================ */
async function render() {
  const isAdmin = ME.role === "admin";
  const tabs = isAdmin
    ? [["approvals", "Approvals"], ["payroll", "Payroll"], ["team", "Team"]]
    : [["week", "My Week"], ["requests", "Requests"], ["pay", "My Pay"]];

  let pending = 0;
  if (isAdmin) {
    const [{ count: a }, { count: b }, { count: c }] = await Promise.all([
      sb.from("timesheets").select("id", { count: "exact", head: true }).eq("status", "submitted"),
      sb.from("requests").select("id", { count: "exact", head: true }).eq("status", "submitted"),
      sb.from("change_requests").select("id", { count: "exact", head: true }).eq("status", "submitted"),
    ]);
    pending = (a || 0) + (b || 0) + (c || 0);
  }

  $("tabs").innerHTML = tabs.map(([id, label]) => {
    const badge = isAdmin && id === "approvals" && pending > 0 ? `<span class="badge">${pending}</span>` : "";
    return `<button class="tab ${TAB === id ? "active" : ""}" onclick="go('${id}')">${label}${badge}</button>`;
  }).join("");

  const v = $("view");
  v.innerHTML = '<div class="empty">Loading…</div>';
  try {
    if (TAB === "week") await viewWeek(v);
    else if (TAB === "requests") await viewRequests(v);
    else if (TAB === "pay") await viewPay(v);
    else if (TAB === "approvals") await viewApprovals(v);
    else if (TAB === "payroll") await viewPayroll(v);
    else if (TAB === "team") await viewTeam(v);
  } catch (e) { fail(e); v.innerHTML = `<div class="banner bad">Could not load this view. ${esc(e.message || "")}</div>`; }
}
function go(id) { TAB = id; render(); }

function chip(s) { const m = { draft: "DRAFT", submitted: "SUBMITTED", approved: "APPROVED", declined: "DECLINED", paid: "PAID" }; return `<span class="chip ${s}"><span>${m[s] || s}</span></span>`; }
function sec(t, right) { return `<div class="sec-title"><h2><span class="slash">/</span> ${t}</h2>${right || ""}</div>`; }
function emptyBox(t) { return `<div class="empty">${t}</div>`; }

/* ============================================================
   EMPLOYEE — MY WEEK
   ============================================================ */
async function loadWeek(ws) {
  const { data, error } = await sb.from("timesheets")
    .select("*, time_entries(*), change_requests(*)")
    .eq("user_id", ME.id).eq("week_start", ws).maybeSingle();
  if (error) throw error;
  return data; // null if no sheet yet
}
async function ensureSheet(ws) {
  let sheet = await loadWeek(ws);
  if (sheet) return sheet;
  const { data, error } = await sb.from("timesheets").insert({ user_id: ME.id, week_start: ws }).select("*, time_entries(*), change_requests(*)").single();
  if (error) throw error;
  return data;
}

async function viewWeek(v) {
  const sheet = await loadWeek(WEEK);
  const status = sheet ? sheet.status : "draft";
  const locked = sheet ? sheet.locked : false;
  const entries = sheet ? (sheet.time_entries || []) : [];
  const openCR = sheet ? (sheet.change_requests || []).find((c) => c.status === "submitted") : null;

  const isThisWeek = WEEK === mondayOf(todayISO());
  const editable = !locked && (status === "draft" || status === "declined");
  const totalHrs = entries.reduce((a, e) => a + Number(e.hours || 0), 0);

  let banner = "";
  if (status === "declined") banner = `<div class="banner bad"><b>Sent back.</b> ${esc(sheet.decline_reason || "Please review and resubmit.")}</div>`;
  else if (status === "submitted") banner = `<div class="banner warn"><b>Submitted.</b> Waiting on admin approval — no edits until it's reviewed.</div>`;
  else if (status === "approved" && openCR) banner = `<div class="banner warn"><b>Change requested.</b> Your amendment is waiting on admin. The week stays locked until then.</div>`;
  else if (status === "approved") banner = `<div class="banner good"><b>Approved${sheet.paid ? " · paid" : ""}.</b> Locked. Use “Request change” if something needs fixing.</div>`;

  // group entries by day
  const byDay = {};
  entries.forEach((e) => { (byDay[e.work_date] = byDay[e.work_date] || []).push(e); });

  let daysHtml = "";
  for (let i = 0; i < 7; i++) {
    const d = addDays(WEEK, i);
    const list = (byDay[d] || []).sort((a, b) => a.created_at < b.created_at ? -1 : 1);
    const rows = list.map((e) => editable ? `
      <div class="entry" data-id="${e.id}">
        <input value="${esc(e.project)}" placeholder="Project / site" onchange="editEntry('${e.id}','project',this.value)" />
        <input type="number" min="0.25" step="0.25" value="${e.hours}" onchange="editEntry('${e.id}','hours',this.value)" />
        <input class="notes" value="${esc(e.notes)}" placeholder="Notes (required)" onchange="editEntry('${e.id}','notes',this.value)" />
        <button class="x" onclick="delEntry('${e.id}')">✕</button>
      </div>` : `
      <div class="entry" data-id="${e.id}">
        <div style="align-self:center;font-weight:600;">${esc(e.project) || "—"}</div>
        <div class="mono" style="align-self:center;">${e.hours} hrs</div>
        <div class="notes steel" style="align-self:center;font-size:14px;">${esc(e.notes)}</div>
        <div></div>
      </div>`).join("");
    const add = editable ? `<button class="addrow" onclick="addEntry('${d}')">+ Add line for ${DAYS[i]}</button>` : "";
    const dayTotal = list.reduce((a, e) => a + Number(e.hours || 0), 0);
    if (list.length === 0 && !editable) continue;
    daysHtml += `<div class="day"><h4>${DAYS[i]} · ${fmtDate(d)}${dayTotal ? ` · <span class="steel">${dayTotal} hrs</span>` : ""}</h4>${rows}${add}</div>`;
  }
  if (!daysHtml) daysHtml = emptyBox("No time logged for this week yet.");

  let actions = "";
  if (editable) actions = `<button class="btn" onclick="submitWeek()" ${totalHrs === 0 ? "disabled" : ""}><span>Submit week for approval</span></button>`;
  else if (status === "approved" && !openCR) actions = `<button class="btn ghost" onclick="openChange('${sheet.id}', ${sheet.paid})"><span>Request change</span></button>`;

  v.innerHTML = `
    <div class="weeknav">
      <button class="navbtn" onclick="shiftWeek(-1)"><span>← Prev</span></button>
      <div style="text-align:center;">
        <div class="wk">${weekLabel(WEEK)}</div>
        <div class="sub">${weekRange(WEEK)} · ${totalHrs} hrs ${chip(sheet ? (sheet.paid ? "paid" : status) : "draft")}</div>
      </div>
      <button class="navbtn" onclick="shiftWeek(1)" ${isThisWeek ? "disabled" : ""}><span>Next →</span></button>
    </div>
    ${!isThisWeek ? `<div style="text-align:center;margin-bottom:12px;"><button class="navbtn" onclick="thisWeek()"><span>Jump to this week</span></button></div>` : ""}
    ${banner}
    ${daysHtml}
    <div style="margin-top:16px;">${actions}</div>`;
}
function shiftWeek(n) { WEEK = addDays(WEEK, n * 7); render(); }
function thisWeek() { WEEK = mondayOf(todayISO()); render(); }

async function addEntry(dateISO) {
  try {
    const sheet = await ensureSheet(WEEK);
    const { error } = await sb.from("time_entries").insert({ timesheet_id: sheet.id, work_date: dateISO, project: "", hours: 1, notes: "" });
    if (error) throw error;
    await render();
  } catch (e) { fail(e); }
}
async function editEntry(id, field, value) {
  let payload = {};
  if (field === "hours") {
    let h = Number(value);
    h = Math.round(h * 4) / 4;               // snap to 15-min
    if (!(h > 0) || h > 24) return fail("Hours must be 0.25–24, in 15-minute steps.");
    payload.hours = h;
  } else payload[field] = value;
  const { error } = await sb.from("time_entries").update(payload).eq("id", id);
  if (error) { fail(error); render(); }
  else if (field === "hours") render(); // refresh totals
}
async function delEntry(id) {
  const { error } = await sb.from("time_entries").delete().eq("id", id);
  if (error) fail(error); else render();
}
async function submitWeek() {
  const sheet = await loadWeek(WEEK);
  if (!sheet) return;
  const entries = sheet.time_entries || [];
  if (entries.length === 0) return fail("Add at least one line before submitting.");
  const bad = entries.find((e) => !e.notes || !e.notes.trim());
  if (bad) return fail("Every line needs a note before you can submit.");
  const { error } = await sb.from("timesheets").update({ status: "submitted" }).eq("id", sheet.id);
  if (error) return fail(error);
  ping("Week submitted for approval");
  render();
}

async function declineSheet(id) {

async function decideReq(id, status) {

async function decideCR(id, sheetId, status) {
  const { error } = await sb.from("change_requests").update({ status, decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);

  if (status === "approved") {

}

    display_name: $("t_name").value.trim(),
    username: $("t_user").value.trim().toLowerCase(),
    pin: $("t_pin").value.trim(),
    pay_type: TEAM_PAYTYPE,
    rate: TEAM_PAYTYPE === "hourly" ? Number($("t_rate")?.value || 0) : 0,
    salary_per_period: TEAM_PAYTYPE === "salary" ? Number($("t_sal")?.value || 0) : 0,
    tax_pct: Number($("t_tax").value || 0),
  };
  if (!body.display_name) return bad("Name required.");
  if (!/^[a-z0-9._-]{2,32}$/.test(body.username)) return bad("Username: 2–32 chars, a–z 0–9 . _ -");
  if (!/^\d{4,8}$/.test(body.pin)) return bad("PIN must be 4–8 digits.");
  $("t_add").disabled = true;
  try { await callFn(body); ping("Crew member added"); render(); }
  catch (e) { bad(e.message); $("t_add").disabled = false; }
}
function editPay(u) {
  const root = $("modal-root");
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="sec-title"><h2><span class="slash">/</span> ${esc(u.display_name)} — pay</h2></div>
    <label class="field"><div class="lbl">Pay type</div>
      <select id="e_type"><option value="hourly" ${u.pay_type === "hourly" ? "selected" : ""}>Hourly</option><option value="salary" ${u.pay_type === "salary" ? "selected" : ""}>Salary</option></select></label>
    <div class="grid2">
      <label class="field"><div class="lbl">Rate ($/hr)</div><input id="e_rate" type="number" min="0" step="0.5" value="${u.rate || 0}" /></label>
      <label class="field"><div class="lbl">Salary / week ($)</div><input id="e_sal" type="number" min="0" step="25" value="${u.salary_per_period || 0}" /></label>
    </div>
    <label class="field"><div class="lbl">Tax withholding (%)</div><input id="e_tax" type="number" min="0" max="60" step="0.5" value="${u.tax_pct || 0}" /></label>
    <div style="display:flex;gap:10px;">
      <button class="btn" onclick="savePay('${u.id}')"><span>Save</span></button>
      <button class="btn ghost" onclick="closeModal()"><span>Cancel</span></button>
    </div></div></div>`;
}
async function savePay(id) {
  const payload = {
    pay_type: $("e_type").value,
    rate: Number($("e_rate").value || 0),
    salary_per_period: Number($("e_sal").value || 0),
    tax_pct: Number($("e_tax").value || 0),
  };
  const { error } = await sb.from("profiles").update(payload).eq("id", id);
  if (error) return fail(error); closeModal(); ping("Pay updated"); render();
}
async function resetPin(id, name) {
  const pin = prompt(`New PIN for ${name} (4–8 digits):`);
  if (pin === null) return;
  if (!/^\d{4,8}$/.test(pin.trim())) return fail("PIN must be 4–8 digits.");
  try { await callFn({ action: "setpin", id, pin: pin.trim() }); ping("PIN reset"); }
  catch (e) { fail(e); }
}
async function toggleActive(id, active) {
  const { error } = await sb.from("profiles").update({ active: !active }).eq("id", id);
  if (error) return fail(error); ping(active ? "Disabled" : "Enabled"); render();
}

/* ---------- wire up + boot ---------- */
$("loginBtn").onclick = doLogin;
$("signout").onclick = signOut;
$("changepin").onclick = openPinChange;
$("loginPin").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
boot();
</script>
