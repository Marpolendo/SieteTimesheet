<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SIETE · Crew Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,700;0,800;1,700;1,800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --red:#C4222B; --red-dark:#8E151C; --ink:#16181A; --steel:#6E7275;
    --line:#E3E1DD; --bg:#F4F3F0; --card:#FFFFFF; --ok:#1E7B3C; --warn:#B07A00;
  }
  *{box-sizing:border-box; border-radius:0;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:'Barlow',sans-serif; -webkit-font-smoothing:antialiased;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{width:100%; border:2px solid var(--line); padding:9px 10px;
    font-family:'Barlow',sans-serif; font-size:15px; color:var(--ink); background:#fff; outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--ink);}
  textarea{min-height:56px; resize:vertical;}
  .hidden{display:none !important;}

  .wm .a{font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; letter-spacing:.02em; color:var(--red);}
  .wm .b{font-family:'Barlow Condensed',sans-serif; font-weight:500; letter-spacing:.42em; color:#9A9DA0; text-transform:uppercase; margin-top:2px;}

  .btn{border:2px solid var(--red); background:var(--red); color:#fff; font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:16px; letter-spacing:.08em; text-transform:uppercase; padding:10px 22px;
    transform:skewX(-10deg); transition:filter .15s;}
  .btn>span{display:inline-block; transform:skewX(10deg);}
  .btn:hover{filter:brightness(.88);}
  .btn.sm{font-size:14px; padding:5px 14px;}
  .btn.dark{background:var(--ink); border-color:var(--ink);}
  .btn.ok{background:var(--ok); border-color:var(--ok);}
  .btn.ghost{background:transparent; color:var(--ink); border-color:var(--ink);}
  .btn.danger{background:transparent; color:var(--red); border-color:var(--red);}
  .btn[disabled]{opacity:.45; cursor:not-allowed; filter:none;}
  .btn.full{width:100%;}

  .chip{display:inline-block; transform:skewX(-10deg); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:12px; letter-spacing:.08em; padding:2px 10px;}
  .chip>span{display:inline-block; transform:skewX(10deg);}
  .chip.draft{background:#EEF0F1; color:var(--steel);}
  .chip.submitted{background:#FFF4DB; color:var(--warn);}
  .chip.approved{background:#E2F2E6; color:var(--ok);}
  .chip.declined{background:#FBE3E4; color:var(--red);}
  .chip.paid{background:#EAEAEA; color:var(--steel);}

  .field{display:block; margin-bottom:14px;}
  .field .lbl{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:.12em;
    color:var(--steel); text-transform:uppercase; margin-bottom:4px;}
  .field .hint{font-size:12px; color:var(--steel); margin-top:3px;}

  .card{background:var(--card); border:1px solid var(--line); border-top:3px solid var(--ink); padding:18px; margin-bottom:16px;}
  .card.thin{border-top:3px solid var(--line); padding:14px;}
  .card.red{border-top:3px solid var(--red);}

  .sec-title{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; gap:12px;}
  .sec-title h2{font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; font-size:24px;
    text-transform:uppercase; letter-spacing:.02em; margin:0;}
  .sec-title h2 .slash{color:var(--red);}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  .row{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .steel{color:var(--steel);}
  .err{color:var(--red); font-size:13px; margin-bottom:10px;}
  .empty{border:2px dashed var(--line); padding:24px 18px; text-align:center; color:var(--steel); font-size:14px; margin-bottom:16px;}

  header{background:var(--ink); padding:14px 18px;}
  .head-in{max-width:1040px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;}
  .head-left{display:flex; align-items:center; gap:14px;}
  .head-tag{border-left:2px solid var(--red); padding-left:12px; font-family:'Barlow Condensed',sans-serif;
    font-style:italic; font-weight:700; font-size:16px; letter-spacing:.14em; color:#fff;}
  .signout{background:none; border:none; color:#9A9DA0; font-family:'Barlow Condensed',sans-serif;
    font-size:13px; letter-spacing:.1em; text-transform:uppercase; padding:0;}
  .tabs{background:#fff; border-bottom:1px solid var(--line);}
  .tabs-in{max-width:1040px; margin:0 auto; display:flex;}
  .tab{background:none; border:none; border-bottom:3px solid transparent; padding:12px 18px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--steel);}
  .tab.active{border-bottom-color:var(--red); color:var(--ink);}
  .tab .badge{margin-left:7px; background:var(--red); color:#fff; font-size:12px; padding:1px 7px;}
  main{max-width:1040px; margin:0 auto; padding:22px 18px 70px;}

  .weeknav{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
  .weeknav .wk{font-family:'Barlow Condensed',sans-serif; font-weight:800; font-style:italic; font-size:22px; text-transform:uppercase;}
  .weeknav .sub{font-size:13px; color:var(--steel);}
  .navbtn{border:2px solid var(--ink); background:#fff; color:var(--ink); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:15px; letter-spacing:.06em; text-transform:uppercase; padding:6px 14px; transform:skewX(-10deg);}
  .navbtn>span{display:inline-block; transform:skewX(10deg);}
  .navbtn[disabled]{opacity:.4; cursor:not-allowed;}

  .dayrail{position:relative; display:grid; grid-template-columns:42px minmax(0,1fr) 42px; gap:8px; align-items:stretch; margin-bottom:16px;}
  .weekgrid{display:grid; grid-auto-flow:column; grid-auto-columns:minmax(210px,1fr); gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth; overscroll-behavior-x:contain; scrollbar-width:thin; padding:2px 2px 10px;}
  .weekgrid::-webkit-scrollbar{height:8px;}
  .weekgrid::-webkit-scrollbar-thumb{background:#C9C7C2;}
  .daycol{border:1px solid var(--line); border-top:3px solid var(--red); background:#fff; display:flex; flex-direction:column; min-height:120px; scroll-snap-align:start;}
  .daycol.today{min-width:clamp(320px,38vw,430px);}
  .dayslide{border:1px solid var(--line); background:#fff; color:var(--ink); font-size:24px; font-weight:700; display:grid; place-items:center; transition:border-color .15s, color .15s, background .15s;}
  .dayslide:hover{border-color:var(--red); color:var(--red); background:#FFF8F8;}
  .dayslide:disabled{opacity:.35; cursor:not-allowed;}
  .daycol.weekend{border-top-color:var(--steel); background:#FAF9F7;}
  .daycol.today{border-top-color:var(--ink); box-shadow:inset 0 0 0 1px var(--ink);}
  .daycol h4{margin:0; padding:8px 9px; border-bottom:1px solid var(--line); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:13px; letter-spacing:.06em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:baseline; gap:4px;}
  .daycol h4 .dt{color:var(--steel); font-weight:500; font-size:11px;}
  .daycol h4 .tot{color:var(--red); font-family:'JetBrains Mono',monospace; font-size:11px;}
  .daybody{padding:8px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .linecard{border:1px solid var(--line); border-left:2px solid var(--red); padding:6px; display:flex; flex-direction:column; gap:5px;}
  .linecard input, .linecard textarea{font-size:13px; padding:6px 7px;}
  .linecard .hr{display:flex; gap:5px; align-items:center;}
  .linecard .hr input{width:100%;}
  .linecard .x{border:1px solid var(--line); background:#fff; color:var(--steel); font-weight:700; padding:0 9px; height:32px; flex:0 0 auto;}
  .linecard .x:hover{border-color:var(--red); color:var(--red);}
  .linecard textarea{min-height:38px;}
  .savemark{font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    min-height:13px; color:var(--ok); opacity:0; transition:opacity .2s;}
  .savemark.show{opacity:1;}
  .savemark.saving{color:var(--steel);}
  .addline{border:1px dashed var(--line); background:#fff; color:var(--steel); width:100%; padding:6px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase;}
  .addline:hover{border-color:var(--red); color:var(--red);}
  .lineread{font-size:12px;}
  .lineread .p{font-weight:700;}
  .lineread .h{font-family:'JetBrains Mono',monospace; color:var(--red);}
  .lineread .n{color:var(--steel); margin-top:2px;}

  @media (max-width:820px){
    .dayrail{grid-template-columns:34px minmax(0,1fr) 34px; gap:6px;}
    .weekgrid{grid-auto-columns:minmax(82vw,1fr); gap:10px;}
    .daycol{min-height:0;}
    .daycol.today{min-width:88vw;}
    .dayslide{font-size:20px;}
    .linecard input, .linecard textarea, .lineread{font-size:15px;}
  }


  /* Day chooser and focused-entry improvements */
  .daypicker{display:flex; gap:7px; overflow-x:auto; padding:1px 1px 9px; margin:-2px 0 8px; scrollbar-width:none;}
  .daypicker::-webkit-scrollbar{display:none;}
  .daypick{flex:1 0 92px; border:1px solid var(--line); border-bottom:3px solid transparent; background:#fff; color:var(--steel); padding:8px 9px; text-align:left; transition:border-color .15s, background .15s, color .15s, transform .15s;}
  .daypick:hover{border-color:#B9B6B0; color:var(--ink); transform:translateY(-1px);}
  .daypick.on{border-color:var(--ink); border-bottom-color:var(--red); color:var(--ink); background:#fff;}
  .daypick.todaypick{box-shadow:inset 0 0 0 1px var(--ink);}
  .daypick.weekendpick{background:#FAF9F7;}
  .daypick .dp-top{display:flex; justify-content:space-between; align-items:center; gap:6px; font-family:'Barlow Condensed',sans-serif; font-weight:800; letter-spacing:.06em; text-transform:uppercase;}
  .daypick .dp-date{font-size:11px; color:var(--steel); margin-top:2px;}
  .daypick .dp-hours{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--red);}
  .todayflag{display:inline-block; background:var(--ink); color:#fff; padding:1px 6px; font-size:10px; letter-spacing:.08em;}
  .daycol.active-day{box-shadow:0 5px 18px rgba(22,24,26,.12), inset 0 0 0 1px var(--ink);}
  .daycol h4{position:sticky; top:0; z-index:2; background:inherit;}
  .hours-wrap{display:grid; grid-template-columns:minmax(0,1fr) auto; gap:5px; align-items:center;}
  .hours-unit{font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; color:var(--steel); text-transform:uppercase;}

  /* Compact time-entry summaries that expand only when editing */
  .entrycard{border:1px solid var(--line); border-left:3px solid var(--red); background:#fff; box-shadow:var(--sh-card);}
  .entrycard.open{border-color:#C7C4BE; box-shadow:var(--sh-2);}
  .entrysummary{width:100%; border:0; background:#fff; color:var(--ink); padding:10px; display:grid; grid-template-columns:minmax(0,1fr) auto auto; gap:9px; align-items:center; text-align:left;}
  .entrysummary:hover{background:#FAF9F7;}
  .entry-main{min-width:0;}
  .entry-project{font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .entry-note{font-size:12px; color:var(--steel); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
  .entry-note.missing{color:var(--warn); font-style:italic;}
  .entry-hours{font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--red); white-space:nowrap;}
  .entry-chevron{font-size:18px; color:var(--steel); line-height:1; transform:rotate(0deg); transition:transform .15s;}
  .entrycard.open .entry-chevron{transform:rotate(180deg);}
  .entryedit{display:none; border-top:1px solid var(--line); padding:10px; background:#FCFBF9;}
  .entrycard.open .entryedit{display:block;}
  .entryedit .field{margin-bottom:9px;}
  .entryedit .field:last-of-type{margin-bottom:7px;}
  .entry-actions{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:7px;}
  .entry-remove{border:0; background:transparent; color:var(--red); font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:5px 0;}
  .entry-remove:hover{text-decoration:underline;}
  .entry-done{border:1px solid var(--ink); background:var(--ink); color:#fff; padding:5px 12px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
  .day-empty{border:1px dashed var(--line); padding:16px 10px; text-align:center; color:var(--steel); font-size:12px;}
  @media (max-width:820px){
    .daypicker{margin-bottom:6px;}
    .daypick{flex-basis:78px; padding:7px;}
    .daypick .dp-hours{display:none;}
    .dayrail{grid-template-columns:30px minmax(0,1fr) 30px;}
    .dayslide{border:none; background:transparent;}
  }

  .seg{display:flex; gap:8px; margin-bottom:14px;}
  .seg button{flex:1; padding:9px 0; border:2px solid var(--line); background:#fff; color:var(--steel);
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; letter-spacing:.08em; text-transform:uppercase;}
  .seg button.on{border-color:var(--ink); background:var(--ink); color:#fff;}

  .stub-row{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line);}
  .stub-row .l{font-size:14px; color:var(--steel);}
  .stub-row .v{font-family:'JetBrains Mono',monospace; font-weight:500; font-size:14px;}
  .stub-row.bold .l{color:var(--ink); font-weight:700;}
  .stub-row.bold .v{font-weight:700; font-size:18px;}
  .v.red{color:var(--red);}

  .banner{padding:12px 14px; margin-bottom:14px; border:1px solid var(--line); font-size:14px;}
  .banner.warn{background:#FFF6E0; border-color:#EACB7A;}
  .banner.bad{background:#FBE3E4; border-color:#E9B4B7;}
  .banner.good{background:#E6F3EA; border-color:#AFD8BB;}

  .totals{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; text-align:center;}
  .totals .k{font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:.14em; color:#9A9DA0; text-transform:uppercase;}
  .totals .val{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; margin-top:3px;}

  .modal-bg{position:fixed; inset:0; background:rgba(22,24,26,.55); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50;}
  .modal{background:#fff; max-width:440px; width:100%; border-top:4px solid var(--red); padding:20px;}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) skewX(-10deg); background:var(--ink); color:#fff;
    padding:10px 22px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.08em; font-size:15px;
    box-shadow:0 4px 14px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:opacity .2s; z-index:60;}
  .toast.show{opacity:1;}
  .toast.bad{background:var(--red-dark);}
  .toast>span{display:inline-block; transform:skewX(10deg);}

  .spinner{min-height:100vh; display:grid; place-items:center;}

  @media (max-width:600px){
    .grid3{grid-template-columns:1fr;}
    .totals{grid-template-columns:1fr 1fr;}
    .head-tag{display:none;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}

  /* ---- official logo + polish pass ---- */
  :root{
    --sh-1:0 1px 2px rgba(22,24,26,.06), 0 1px 3px rgba(22,24,26,.08);
    --sh-2:0 4px 14px rgba(22,24,26,.10);
    --sh-card:0 1px 0 rgba(22,24,26,.02), 0 1px 3px rgba(22,24,26,.07);

<body>

<div id="boot" class="spinner"><div class="logo boot"></div></div>

<!-- LOGIN -->
<div id="login" class="hidden" style="min-height:100vh; background:var(--ink);">
  <div style="max-width:380px; margin:0 auto; padding:70px 20px;">
    <div style="margin-bottom:34px;">
      <div class="logo login"></div>
      <div style="margin-top:14px; font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:700; font-size:19px; letter-spacing:.16em; color:#fff;">CREW LEDGER</div>
      <div style="color:#9A9DA0; font-size:14px; margin-top:6px;">Time, requests, and payroll — one book.</div>
    </div>
    <div style="background:#fff; padding:22px; border-top:4px solid var(--red);">
      <label class="field"><div class="lbl">Account</div><select id="loginUser"></select></label>
      <label class="field"><div class="lbl">PIN</div>
        <input id="loginPin" type="password" inputmode="numeric" placeholder="••••••" />
      </label>
      <div id="loginErr" class="err hidden"></div>
      <button class="btn full" id="loginBtn"><span>Clock in</span></button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header><div class="head-in">
    <div class="head-left">
      <div class="logo head"></div>
      <div class="head-tag">CREW LEDGER</div>
    </div>
    <div style="text-align:right;">
      <div id="meName" style="color:#fff; font-weight:600; font-size:14px;"></div>
      <div style="display:flex; gap:14px; justify-content:flex-end;">
        <button class="signout" id="changepin">Change PIN</button>
        <button class="signout" id="signout">Sign out</button>
      </div>
    </div>
  </div></header>
  <div class="tabs"><div id="tabs" class="tabs-in"></div></div>
  <main id="view"></main>
</div>

<div id="modal-root"></div>
<div id="toast" class="toast"><span></span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
/* ============================================================
   SIETE Crew Ledger — Supabase-backed client
   ============================================================ */
const CFG = window.SIETE_CONFIG || {};
const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);

let ME = null;     // profile row
let TAB = null;
let WEEK = null;   // employee: current week_start (Monday, YYYY-MM-DD)
let ACTIVE_DAY = null; // preserves the selected day while entries auto-save and re-render
const EXPANDED_ENTRIES = new Set(); // keeps entry editors open through auto-save re-renders

/* ---------- utils ---------- */
const $ = (id) => document.getElementById(id);
const money = (n) => (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

function mondayOf(d) {
  const t = new Date(d + "T00:00:00");
  const day = (t.getDay() + 6) % 7; // Mon=0
  t.setDate(t.getDate() - day);
  return t.toISOString().slice(0, 10);
}
function addDays(iso, n) { const t = new Date(iso + "T00:00:00"); t.setDate(t.getDate() + n); return t.toISOString().slice(0, 10); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) { if (!iso) return "—"; const [y, m, d] = iso.split("-"); return `${m}/${d}/${y.slice(2)}`; }
function weekLabel(ws) { return `Week of ${fmtDate(ws)}`; }
function weekRange(ws) { return `${fmtDate(ws)} – ${fmtDate(addDays(ws, 6))}`; }

let toastTimer;
function ping(msg, bad) {
  const t = $("toast"); t.querySelector("span").textContent = msg;
  t.className = "toast show" + (bad ? " bad" : "");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => (t.className = "toast"), 2800);
}
function fail(e) { ping(typeof e === "string" ? e : (e?.message || "Something went wrong"), true); }

/* ---------- payroll math (weekly) ---------- */
function computePay(profile, sheets, reqs) {
  const hours = sheets.reduce((s, ts) => s + (ts.time_entries || []).reduce((a, e) => a + Number(e.hours || 0), 0), 0);
  const gross = profile.pay_type === "hourly"
    ? hours * Number(profile.rate || 0)
    : sheets.length * Number(profile.salary_per_period || 0);
  const tax = gross * (Number(profile.tax_pct || 0) / 100);
  const reimb = reqs.reduce((s, r) => s + Number(r.amount || 0), 0);
  return { hours, gross, tax, reimb, net: gross - tax + reimb };
}

/* ============================================================
   AUTH
   ============================================================ */
async function boot() {
  if (!CFG.SUPABASE_URL || CFG.SUPABASE_URL.includes("YOUR-PROJECT")) {
    $("boot").innerHTML = '<div style="max-width:360px;text-align:center;color:var(--steel);font-size:14px;">Add your Supabase URL and anon key to <b>config.js</b>, then reload.</div>';
    return;
  }
  const { data } = await sb.auth.getSession();
  if (data.session) { await afterLogin(); }
  else { await showLogin(); }
}

async function showLogin() {
  $("boot").classList.add("hidden");
  $("app").classList.add("hidden");
  $("login").classList.remove("hidden");
  const sel = $("loginUser");
  sel.innerHTML = '<option>Loading…</option>';
  const { data, error } = await sb.rpc("list_usernames");
  if (error) { sel.innerHTML = '<option>Could not load accounts</option>'; return; }
  sel.innerHTML = (data || []).map((u) =>
    `<option value="${esc(u.username)}">${esc(u.display_name)} — ${u.role === "admin" ? "Admin" : "Crew"}</option>`).join("");
}

async function doLogin() {
  const username = $("loginUser").value;
  const pin = $("loginPin").value.trim();
  const err = $("loginErr");
  err.classList.add("hidden");
  if (!username || !pin) { err.textContent = "Pick an account and enter your PIN."; err.classList.remove("hidden"); return; }
  const email = `${username}@${CFG.EMAIL_DOMAIN}`;
  $("loginBtn").disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pin });
  $("loginBtn").disabled = false;
  if (error) { err.textContent = "Wrong PIN, or account not found."; err.classList.remove("hidden"); return; }
  $("loginPin").value = "";
  await afterLogin();
}

async function afterLogin() {
  const { data: sess } = await sb.auth.getSession();
  const uid = sess.session.user.id;
  const { data: prof, error } = await sb.from("profiles").select("*").eq("id", uid).single();
  if (error || !prof) { await sb.auth.signOut(); return showLogin(); }
  ME = prof;
  TAB = ME.role === "admin" ? "approvals" : "week";
  WEEK = mondayOf(todayISO());
  $("boot").classList.add("hidden");
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("meName").textContent = ME.display_name;
  await render();
}

async function signOut() { await sb.auth.signOut(); ME = null; showLogin(); }

/* ---------- self-service PIN change (any signed-in user) ---------- */
function openPinChange() {
  const email = `${ME.username}@${CFG.EMAIL_DOMAIN}`;
  $("modal-root").innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="sec-title"><h2><span class="slash">/</span> Change PIN</h2></div>
        <p class="steel" style="font-size:14px;margin-top:0;">Optional — leave it as is if you'd rather not.</p>
        <label class="field"><div class="lbl">Current PIN</div>
          <input id="pc_old" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <label class="field"><div class="lbl">New PIN (4–8 digits)</div>
          <input id="pc_new" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <label class="field"><div class="lbl">Confirm new PIN</div>
          <input id="pc_new2" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <div id="pc_err" class="err hidden"></div>
        <div style="display:flex;gap:10px;">
          <button class="btn" id="pc_save"><span>Update PIN</span></button>
          <button class="btn ghost" onclick="closeModal()"><span>Cancel</span></button>
        </div>
      </div>
    </div>`;
  $("pc_save").onclick = () => savePinChange(email);
}
async function savePinChange(email) {
  const oldPin = $("pc_old").value.trim();
  const newPin = $("pc_new").value.trim();
  const conf = $("pc_new2").value.trim();
  const err = $("pc_err"); const bad = (m) => { err.textContent = m; err.classList.remove("hidden"); };
  if (!/^\d{4,8}$/.test(newPin)) return bad("New PIN must be 4–8 digits.");
  if (newPin !== conf) return bad("New PINs don't match.");
  if (newPin === oldPin) return bad("New PIN is the same as the old one.");
  $("pc_save").disabled = true;
  // verify the current PIN by re-authenticating (updateUser doesn't check it)
  const { error: reauth } = await sb.auth.signInWithPassword({ email, password: oldPin });
  if (reauth) { $("pc_save").disabled = false; return bad("Current PIN is wrong."); }
  const { error } = await sb.auth.updateUser({ password: newPin });
  if (error) { $("pc_save").disabled = false; return bad(error.message); }
  closeModal(); ping("PIN updated");
}

async function render() {
  const isAdmin = ME.role === "admin";
  const tabs = isAdmin
    ? [["approvals", "Approvals"], ["payroll", "Payroll"], ["team", "Team"]]
    : [["week", "My Week"], ["requests", "Requests"], ["pay", "My Pay"]];

  let pending = 0;
  if (isAdmin) {
    const [{ count: a }, { count: b }, { count: c }] = await Promise.all([
      sb.from("timesheets").select("id", { count: "exact", head: true }).eq("status", "submitted"),
      sb.from("requests").select("id", { count: "exact", head: true }).eq("status", "submitted"),
      sb.from("change_requests").select("id", { count: "exact", head: true }).eq("status", "submitted"),
    ]);
    pending = (a || 0) + (b || 0) + (c || 0);
  }

  $("tabs").innerHTML = tabs.map(([id, label]) => {
    const badge = isAdmin && id === "approvals" && pending > 0 ? `<span class="badge">${pending}</span>` : "";
    return `<button class="tab ${TAB === id ? "active" : ""}" onclick="go('${id}')">${label}${badge}</button>`;

  const v = $("view");

    else if (TAB === "payroll") await viewPayroll(v);
    else if (TAB === "team") await viewTeam(v);

function go(id) { TAB = id; render(); }

function chip(s) { const m = { draft: "DRAFT", submitted: "SUBMITTED", approved: "APPROVED", declined: "DECLINED", paid: "PAID" }; return `<span class="chip ${s}"><span>${m[s] || s}</span></span>`; }
function sec(t, right) { return `<div class="sec-title"><h2><span class="slash">/</span> ${t}</h2>${right || ""}</div>`; }
function emptyBox(t) { return `<div class="empty">${t}</div>`; }
function skeleton() {

}
function statCards(items) {

}

   EMPLOYEE — MY WEEK
   ============================================================ */
async function loadWeek(ws) {
  const { data, error } = await sb.from("timesheets")
    .select("*, time_entries(*), change_requests(*)")
    .eq("user_id", ME.id).eq("week_start", ws).maybeSingle();
  if (error) throw error;
  return data; // null if no sheet yet
}
async function ensureSheet(ws) {
  let sheet = await loadWeek(ws);
  if (sheet) return sheet;
  const { data, error } = await sb.from("timesheets").insert({ user_id: ME.id, week_start: ws }).select("*, time_entries(*), change_requests(*)").single();
  if (error) throw error;
  return data;
}

async function viewWeek(v) {
  const sheet = await loadWeek(WEEK);
  const status = sheet ? sheet.status : "draft";
  const locked = sheet ? sheet.locked : false;
  const entries = sheet ? (sheet.time_entries || []) : [];
  const openCR = sheet ? (sheet.change_requests || []).find((c) => c.status === "submitted") : null;

  const isThisWeek = WEEK === mondayOf(todayISO());
  const editable = !locked && (status === "draft" || status === "declined");
  const totalHrs = entries.reduce((a, e) => a + Number(e.hours || 0), 0);

  let banner = "";
  if (status === "declined") banner = `<div class="banner bad"><b>Sent back.</b> ${esc(sheet.decline_reason || "Please review and resubmit.")}</div>`;
  else if (status === "submitted") banner = `<div class="banner warn"><b>Submitted.</b> Waiting on admin approval — no edits until it's reviewed.</div>`;
  else if (status === "approved" && openCR) banner = `<div class="banner warn"><b>Change requested.</b> Your amendment is waiting on admin. The week stays locked until then.</div>`;
  else if (status === "approved") banner = `<div class="banner good"><b>Approved${sheet.paid ? " · paid" : ""}.</b> Locked. Use “Request change” if something needs fixing.</div>`;

  // group entries by day
  const byDay = {};
  entries.forEach((e) => { (byDay[e.work_date] = byDay[e.work_date] || []).push(e); });
  const todayStr = todayISO();

  let cols = "";
  for (let i = 0; i < 7; i++) {
    const d = addDays(WEEK, i);
    const list = (byDay[d] || []).sort((a, b) => a.created_at < b.created_at ? -1 : 1);
    const dayTotal = list.reduce((a, e) => a + Number(e.hours || 0), 0);
    const weekend = i >= 5 ? " weekend" : "";
    const isToday = d === todayStr ? " today" : "";

    const cards = list.map((e) => {
      const expanded = EXPANDED_ENTRIES.has(String(e.id));
      const projectLabel = esc(e.project || "Untitled project / site");
      const noteLabel = e.notes && e.notes.trim() ? esc(e.notes) : "Notes required";
      if (!editable) return `
      <div class="linecard lineread">
        <div class="p">${projectLabel} <span class="h">${e.hours}h</span></div>
        <div class="n">${esc(e.notes)}</div>
      </div>`;
      return `
      <div class="entrycard${expanded ? " open" : ""}" data-id="${e.id}" id="entry-${e.id}">
        <button type="button" class="entrysummary" onclick="toggleEntry('${e.id}')" aria-expanded="${expanded}" aria-controls="edit-${e.id}">
          <span class="entry-main">
            <span class="entry-project">${projectLabel}</span>
            <span class="entry-note${e.notes && e.notes.trim() ? "" : " missing"}">${noteLabel}</span>
          </span>
          <span class="entry-hours">${e.hours} hrs</span>
          <span class="entry-chevron" aria-hidden="true">⌄</span>
        </button>
        <div class="entryedit" id="edit-${e.id}">
          <label class="field"><div class="lbl">Project / site</div><input value="${esc(e.project)}" placeholder="Project / site" onchange="editEntry('${e.id}','project',this.value)" /></label>
          <label class="field"><div class="lbl">Hours</div><div class="hours-wrap"><input aria-label="Hours" type="number" min="0.25" max="24" step="0.25" value="${e.hours}" onchange="editEntry('${e.id}','hours',this.value)" title="Hours (0.25 = 15 min)" /><span class="hours-unit">hrs</span></div></label>
          <label class="field"><div class="lbl">Work notes</div><textarea placeholder="Describe the work completed (required)" onchange="editEntry('${e.id}','notes',this.value)">${esc(e.notes)}</textarea></label>
          <div class="entry-actions">
            <button type="button" class="entry-remove" onclick="delEntry('${e.id}')" aria-label="Remove time entry">Remove entry</button>
            <button type="button" class="entry-done" onclick="toggleEntry('${e.id}', false)">Done</button>
          </div>
          <div class="savemark" id="st-${e.id}"></div>
        </div>
      </div>`;
    }).join("");

    const add = editable ? `<button class="addline" onclick="addEntry('${d}')">+ Add line</button>` : "";
    const body = (cards || add) ? `${cards}${add}` : `<div class="day-empty">No time logged</div>`;

    cols += `<div class="daycol${weekend}${isToday}${ACTIVE_DAY === d ? " active-day" : ""}" data-work-date="${d}">
      <h4><span>${DAYS[i]}${isToday ? ` · Today` : ""}</span><span class="dt">${fmtDate(d)}</span>${dayTotal ? `<span class="tot">${dayTotal}h</span>` : ""}</h4>
      <div class="daybody">${body}</div>
    </div>`;
  }
  const picker = Array.from({length:7}, (_, i) => {
    const d = addDays(WEEK, i);
    const dayTotal = (byDay[d] || []).reduce((a, e) => a + Number(e.hours || 0), 0);
    const isToday = d === todayStr;
    return `<button type="button" class="daypick${ACTIVE_DAY === d ? " on" : ""}${isToday ? " todaypick" : ""}${i >= 5 ? " weekendpick" : ""}" data-day-pick="${d}" onclick="goToDay('${d}')" aria-label="Open ${DAYS[i]} ${fmtDate(d)}">
      <div class="dp-top"><span>${DAYS[i]}</span>${dayTotal ? `<span class="dp-hours">${dayTotal}h</span>` : ""}</div>
      <div class="dp-date">${fmtDate(d)} ${isToday ? `<span class="todayflag">Today</span>` : ""}</div>
    </button>`;
  }).join("");
  const daysHtml = `<div class="daypicker" id="daypicker">${picker}</div><div class="dayrail">
    <button class="dayslide" type="button" aria-label="Previous day" onclick="slideDays(-1)">‹</button>
    <div class="weekgrid" id="weekgrid" aria-label="Days in selected week">${cols}</div>
    <button class="dayslide" type="button" aria-label="Next day" onclick="slideDays(1)">›</button>
  </div>`;

  let actions = "";
  if (editable) actions = `<button class="btn" onclick="submitWeek()" ${totalHrs === 0 ? "disabled" : ""}><span>Submit week for approval</span></button>`;
  else if (status === "approved" && !openCR) actions = `<button class="btn ghost" onclick="openChange('${sheet.id}', ${sheet.paid})"><span>Request change</span></button>`;

  const savedNote = editable ? `<div class="steel" style="font-size:13px;text-align:center;margin-bottom:12px;">Lines save automatically. When the week is ready, submit it for approval.</div>` : "";

  const daysLogged = Object.keys(byDay).filter((d) => (byDay[d] || []).length).length;
  const ot = totalHrs > 40;
  const statusLabel = sheet ? (sheet.paid ? "Paid" : ({ draft: "Draft", submitted: "Submitted", approved: "Approved", declined: "Sent back" }[status])) : "Not started";
  const statusAccent = status === "approved" ? "ok" : (status === "declined" ? "red" : (status === "submitted" ? "warn" : ""));
  const statbar = statCards([
    { k: "Hours this week", v: totalHrs + (ot ? ` <span class="ot"><span>OT</span></span>` : ""), accent: ot ? "warn" : "red", sub: ot ? "Over 40 — overtime" : "of 40 hr week" },
    { k: "Days logged", v: `${daysLogged}<span style="font-size:15px;color:var(--steel)"> / 7</span>`, small: false },
    { k: "Status", v: statusLabel, small: true, accent: statusAccent },
  ]);

  v.innerHTML = `
    <div class="weeknav">
      <button class="navbtn" onclick="shiftWeek(-1)"><span>← Prev</span></button>
      <div style="text-align:center;">
        <div class="wk">${weekLabel(WEEK)}</div>
        <div class="sub">${weekRange(WEEK)} · ${totalHrs} hrs ${chip(sheet ? (sheet.paid ? "paid" : status) : "draft")}</div>
      </div>
      <button class="navbtn" onclick="shiftWeek(1)" ${isThisWeek ? "disabled" : ""}><span>Next →</span></button>
    </div>
    ${!isThisWeek ? `<div style="text-align:center;margin-bottom:12px;"><button class="navbtn" onclick="thisWeek()"><span>Jump to this week</span></button></div>` : ""}
    ${statbar}
    ${banner}
    ${daysHtml}
    ${savedNote}
    <div style="margin-top:4px;">${actions}</div>`;

  requestAnimationFrame(() => {
    const grid = $("weekgrid");
    if (!ACTIVE_DAY || !grid?.querySelector(`[data-work-date="${ACTIVE_DAY}"]`)) {
      ACTIVE_DAY = grid?.querySelector(".daycol.today")?.dataset.workDate || grid?.querySelector(".daycol:not(.weekend)")?.dataset.workDate || null;
    }
    const focusDay = ACTIVE_DAY ? grid?.querySelector(`[data-work-date="${ACTIVE_DAY}"]`) : null;
    if (grid && focusDay) {
      grid.scrollLeft = Math.max(0, focusDay.offsetLeft - 2);
      syncDayUI(ACTIVE_DAY);
      let scrollTimer;
      grid.addEventListener("scroll", () => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          const cards = [...grid.querySelectorAll(".daycol")];
          const nearest = cards.reduce((best, card) => Math.abs(card.offsetLeft-grid.scrollLeft) < Math.abs(best.offsetLeft-grid.scrollLeft) ? card : best, cards[0]);
          if (nearest) { ACTIVE_DAY = nearest.dataset.workDate; syncDayUI(ACTIVE_DAY); }
        }, 70);
      }, {passive:true});
    }
  });
}
function toggleEntry(id, forceOpen) {
  id = String(id);
  const card = document.getElementById("entry-" + id);
  const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : !EXPANDED_ENTRIES.has(id);
  if (shouldOpen) EXPANDED_ENTRIES.add(id); else EXPANDED_ENTRIES.delete(id);
  if (card) {
    card.classList.toggle("open", shouldOpen);
    card.querySelector(".entrysummary")?.setAttribute("aria-expanded", String(shouldOpen));
    if (shouldOpen) setTimeout(() => card.querySelector("input")?.focus(), 0);
  }
}

function syncDayUI(dateISO) {
  document.querySelectorAll("[data-day-pick]").forEach((b) => b.classList.toggle("on", b.dataset.dayPick === dateISO));
  document.querySelectorAll(".daycol").forEach((c) => c.classList.toggle("active-day", c.dataset.workDate === dateISO));
  document.querySelector(`[data-day-pick="${dateISO}"]`)?.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
}
function goToDay(dateISO) {
  const grid = $("weekgrid");
  const card = grid?.querySelector(`[data-work-date="${dateISO}"]`);
  if (!card) return;
  ACTIVE_DAY = dateISO;
  syncDayUI(dateISO);
  card.scrollIntoView({ behavior: "smooth", inline: "start", block: "nearest" });
}
function slideDays(direction) {
  const grid = $("weekgrid");
  if (!grid) return;
  const cards = [...grid.querySelectorAll(".daycol")];
  if (!cards.length) return;
  const current = Math.max(0, cards.findIndex(c => c.dataset.workDate === ACTIVE_DAY));
  const next = Math.max(0, Math.min(cards.length - 1, current + direction));
  goToDay(cards[next].dataset.workDate);
}
function shiftWeek(n) { WEEK = addDays(WEEK, n * 7); ACTIVE_DAY = null; render(); }
function thisWeek() { WEEK = mondayOf(todayISO()); ACTIVE_DAY = todayISO(); render(); }

let saveFade = {};
function markSaved(id, state) {
  const el = $("st-" + id);
  if (!el) return;
  clearTimeout(saveFade[id]);
  if (state === "saving") { el.textContent = "Saving…"; el.className = "savemark saving show"; return; }
  el.textContent = "Saved ✓"; el.className = "savemark show";
  saveFade[id] = setTimeout(() => { el.className = "savemark"; }, 1800);
}

async function addEntry(dateISO) {
  try {
    const sheet = await ensureSheet(WEEK);
    const { data, error } = await sb.from("time_entries").insert({ timesheet_id: sheet.id, work_date: dateISO, project: "", hours: 1, notes: "" }).select("id").single();
    if (error) throw error;
    ACTIVE_DAY = dateISO;
    if (data?.id) EXPANDED_ENTRIES.add(String(data.id));
    await render();
  } catch (e) { fail(e); }
}
async function editEntry(id, field, value) {
  let payload = {};
  if (field === "hours") {
    let h = Number(value);
    h = Math.round(h * 4) / 4;               // snap to 15-min
    if (!(h > 0) || h > 24) return fail("Hours must be 0.25–24, in 15-minute steps.");
    payload.hours = h;
  } else payload[field] = value;
  markSaved(id, "saving");
  const { error } = await sb.from("time_entries").update(payload).eq("id", id);
  if (error) { fail(error); return render(); }
  if (field === "hours") { await render(); markSaved(id); } // re-render updates totals, then confirm
  else markSaved(id);
}
async function delEntry(id) {
  const { error } = await sb.from("time_entries").delete().eq("id", id);
  if (error) fail(error); else { EXPANDED_ENTRIES.delete(String(id)); render(); }
}
async function submitWeek() {
  const sheet = await loadWeek(WEEK);
  if (!sheet) return;
  const entries = sheet.time_entries || [];
  if (entries.length === 0) return fail("Add at least one line before submitting.");
  const bad = entries.find((e) => !e.notes || !e.notes.trim());
  if (bad) return fail("Every line needs a note before you can submit.");
  const { error } = await sb.from("timesheets").update({ status: "submitted" }).eq("id", sheet.id);
  if (error) return fail(error);
  ping("Week submitted for approval");
  render();
}

async function viewPay(v) {
  const [{ data: sheets }, { data: reqs }] = await Promise.all([
    sb.from("timesheets").select("*, time_entries(hours)").eq("user_id", ME.id).eq("status", "approved"),
    sb.from("requests").select("*").eq("user_id", ME.id).eq("status", "approved"),
  ]);
  const upSheets = (sheets || []).filter((s) => !s.paid), paidSheets = (sheets || []).filter((s) => s.paid);
  const upReqs = (reqs || []).filter((r) => !r.paid), paidReqs = (reqs || []).filter((r) => r.paid);
  const up = computePay(ME, upSheets, upReqs), pd = computePay(ME, paidSheets, paidReqs);
  v.innerHTML = `${sec("Next paycheck (approved, unpaid)")}${payStub(ME, up)}
    ${sec("Paid to date")}
    <div class="card row"><div class="steel" style="font-size:14px;">${pd.hours} hrs paid · ${money(pd.reimb)} in requests</div>
      <div class="mono" style="font-weight:700;font-size:20px;">${money(pd.net)}</div></div>`;
}
function payStub(p, x) {
  const gl = p.pay_type === "hourly" ? `Gross — ${x.hours} hrs × ${money(Number(p.rate || 0))}/hr` : `Gross — salary × weeks approved`;
  return `<div class="card red">
    <div class="stub-row"><span class="l">${gl}</span><span class="v">${money(x.gross)}</span></div>
    <div class="stub-row"><span class="l">Tax withholding (${p.tax_pct || 0}%)</span><span class="v red">−${money(x.tax)}</span></div>
    <div class="stub-row"><span class="l">Reimbursements + per diem (untaxed)</span><span class="v">+${money(x.reimb)}</span></div>
    <div class="stub-row bold"><span class="l">Net paycheck</span><span class="v">${money(x.net)}</span></div>
  </div>`;
}

/* ============================================================
   ADMIN — APPROVALS
   ============================================================ */
async function viewApprovals(v) {
  const [{ data: sheets }, { data: reqs }, { data: crs }] = await Promise.all([
    sb.from("timesheets").select("*, time_entries(*), profile:profiles!timesheets_user_id_fkey(display_name)").eq("status", "submitted").order("submitted_at"),
    sb.from("requests").select("*, profile:profiles!requests_user_id_fkey(display_name)").eq("status", "submitted").order("created_at"),
    sb.from("change_requests").select("*, profile:profiles!change_requests_user_id_fkey(display_name), timesheet:timesheets(week_start,paid)").eq("status", "submitted").order("created_at"),
  ]);

  const sheetCards = (sheets || []).length ? sheets.map((ts) => {
    const total = (ts.time_entries || []).reduce((a, e) => a + Number(e.hours || 0), 0);
    const otTag = total > 40 ? ` <span class="ot"><span>OT ${(total-40)}h</span></span>` : "";
    const lines = (ts.time_entries || []).sort((a, b) => a.work_date < b.work_date ? -1 : 1).map((e) =>
      `<div class="row" style="border-bottom:1px solid var(--line);padding:5px 0;font-size:13px;">
        <span class="mono">${fmtDate(e.work_date)}</span>
        <span style="flex:1;margin:0 10px;">${esc(e.project) || "—"} — <span class="steel">${esc(e.notes)}</span></span>
        <span class="mono" style="font-weight:700;">${e.hours}h</span></div>`).join("");
    return `<div class="card" style="border-left:4px solid var(--red);border-top:1px solid var(--line);">
      <div class="row"><div style="font-weight:700;font-size:15px;">${esc(ts.profile?.display_name)} · ${weekLabel(ts.week_start)}</div>
        <div class="mono" style="font-weight:700;">${total} hrs${otTag}</div></div>
      <div style="margin:8px 0;">${lines || '<span class="steel">No lines.</span>'}</div>
      <div style="display:flex;gap:8px;">
        <button class="btn sm ok" onclick="approveSheet('${ts.id}')"><span>Approve week</span></button>
        <button class="btn sm danger" onclick="declineSheet('${ts.id}')"><span>Send back</span></button>
      </div></div>`;
  }).join("") : emptyBox("No weeks waiting.");

  const reqCards = (reqs || []).length ? reqs.map((r) =>
    `<div class="card thin" style="border-left:4px solid var(--red);">
      <div class="row"><div style="font-size:14px;"><b>${esc(r.profile?.display_name)}</b>
        <span class="steel" style="margin:0 8px;">·</span>${r.type === "perdiem" ? "Per diem" : "Reimbursement"}
        <span class="steel" style="margin:0 8px;">·</span>${fmtDate(r.req_date)}
        <span class="steel" style="margin:0 8px;">·</span><span class="mono" style="font-weight:700;">${money(r.amount)}</span></div>
        <div style="display:flex;gap:8px;">
          <button class="btn sm ok" onclick="decideReq('${r.id}','approved')"><span>Approve</span></button>
          <button class="btn sm danger" onclick="decideReq('${r.id}','declined')"><span>Decline</span></button></div></div>
      <div class="steel" style="font-size:14px;margin-top:6px;">${esc(r.notes)}</div></div>`).join("") : emptyBox("No requests waiting.");

  const crCards = (crs || []).length ? crs.map((c) =>
    `<div class="card thin" style="border-left:4px solid var(--warn);">
      ${c.timesheet?.paid ? '<div class="banner bad" style="margin-bottom:8px;">Already paid — approving reopens a paid week. Handle as a correction.</div>' : ""}
      <div class="row"><div style="font-size:14px;"><b>${esc(c.profile?.display_name)}</b>
        <span class="steel" style="margin:0 8px;">·</span>${weekLabel(c.timesheet?.week_start)}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn sm ok" onclick="decideCR('${c.id}','${c.timesheet_id}','approved')"><span>Approve &amp; reopen</span></button>
          <button class="btn sm danger" onclick="decideCR('${c.id}','${c.timesheet_id}','declined')"><span>Decline</span></button></div></div>
      <div class="steel" style="font-size:14px;margin-top:6px;">${esc(c.reason)}</div></div>`).join("") : emptyBox("No change requests.");

  v.innerHTML = `${statCards([
      { k: "Weeks to approve", v: (sheets || []).length, accent: (sheets || []).length ? "red" : "" },
      { k: "Requests waiting", v: (reqs || []).length, accent: (reqs || []).length ? "warn" : "" },
      { k: "Change requests", v: (crs || []).length, accent: (crs || []).length ? "warn" : "" },
    ])}
    ${sec("Weeks to approve")}${sheetCards}
    ${sec("Reimbursements & per diem")}${reqCards}
    ${sec("Change requests")}${crCards}`;
}

async function approveSheet(id) {
  const { error } = await sb.from("timesheets").update({ status: "approved" }).eq("id", id);
  if (error) return fail(error); ping("Week approved & locked"); render();
}
async function declineSheet(id) {
  const reason = prompt("What needs fixing? (sent to the employee)");
  if (reason === null) return;
  const { error } = await sb.from("timesheets").update({ status: "declined", decline_reason: reason || "", decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);
  if (error) return fail(error); ping("Sent back to employee"); render();
}
async function decideReq(id, status) {
  const { error } = await sb.from("requests").update({ status, decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);
  if (error) return fail(error); ping(status === "approved" ? "Approved" : "Declined"); render();
}
async function decideCR(id, sheetId, status) {
  const { error } = await sb.from("change_requests").update({ status, decided_at: new Date().toISOString(), decided_by: ME.id }).eq("id", id);
  if (error) return fail(error);
  if (status === "approved") {
    const { error: e2 } = await sb.from("timesheets").update({ status: "draft", decline_reason: "Reopened for changes" }).eq("id", sheetId);
    if (e2) return fail(e2);
    ping("Reopened for the employee");
  } else ping("Change request declined");
  render();
}

/* ============================================================
   ADMIN — PAYROLL
   ============================================================ */
async function viewPayroll(v) {
  const { data: emps } = await sb.from("profiles").select("*").eq("role", "employee").eq("active", true).order("display_name");
  const [{ data: sheets }, { data: reqs }] = await Promise.all([
    sb.from("timesheets").select("*, time_entries(hours)").eq("status", "approved").eq("paid", false),
    sb.from("requests").select("*").eq("status", "approved").eq("paid", false),
  ]);

  let tot = { gross: 0, tax: 0, reimb: 0, net: 0 };
  const cards = (emps || []).map((u) => {
    const mySheets = (sheets || []).filter((s) => s.user_id === u.id);
    const myReqs = (reqs || []).filter((r) => r.user_id === u.id);
    const p = computePay(u, mySheets, myReqs);
    tot.gross += p.gross; tot.tax += p.tax; tot.reimb += p.reimb; tot.net += p.net;
    const empty = mySheets.length === 0 && myReqs.length === 0;
    const meta = u.pay_type === "hourly"
      ? `Hourly · ${money(Number(u.rate || 0))}/hr · ${u.tax_pct || 0}% tax`
      : `Salary · ${money(Number(u.salary_per_period || 0))}/wk · ${u.tax_pct || 0}% tax`;
    return `<div class="card">
      <div class="row" style="margin-bottom:8px;">
        <div><div style="font-weight:700;font-size:16px;">${esc(u.display_name)}</div><div class="steel" style="font-size:13px;">${meta} · ${mySheets.length} wk approved</div></div>
        <button class="btn sm dark" ${empty ? "disabled" : ""} onclick="markPaid('${u.id}')"><span>Mark paid</span></button>
      </div>${empty ? '<div class="steel" style="font-size:14px;">Nothing approved for this run.</div>' : payStub(u, p)}</div>`;
  }).join("");

  v.innerHTML = `${sec("Pay run — approved & unpaid")}
    <div class="card" style="background:var(--ink);border-top:3px solid var(--red);color:#fff;">
      <div class="totals">
        <div><div class="k">Gross</div><div class="val">${money(tot.gross)}</div></div>
        <div><div class="k">Tax</div><div class="val">${money(tot.tax)}</div></div>
        <div><div class="k">Requests</div><div class="val">${money(tot.reimb)}</div></div>
        <div><div class="k">Net owed</div><div class="val">${money(tot.net)}</div></div>
      </div></div>
    ${cards || emptyBox("No active employees yet.")}`;
}
async function markPaid(userId) {
  const [{ error: e1 }, { error: e2 }] = await Promise.all([
    sb.from("timesheets").update({ paid: true }).eq("user_id", userId).eq("status", "approved").eq("paid", false),
    sb.from("requests").update({ paid: true }).eq("user_id", userId).eq("status", "approved").eq("paid", false),
  ]);
  if (e1 || e2) return fail(e1 || e2); ping("Marked paid"); render();
}

/* ============================================================
   ADMIN — TEAM
   ============================================================ */
async function callFn(body) {
  const { data: sess } = await sb.auth.getSession();
  const res = await fetch(`${CFG.SUPABASE_URL}/functions/v1/create-crew-member`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${sess.session.access_token}`, "apikey": CFG.SUPABASE_ANON_KEY },
    body: JSON.stringify(body),
  });
  const out = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(out.error || "Request failed");
  return out;
}

let TEAM_PAYTYPE = "hourly";
async function viewTeam(v) {
  const { data: emps } = await sb.from("profiles").select("*").eq("role", "employee").order("display_name");
  const payField = TEAM_PAYTYPE === "hourly"
    ? `<label class="field"><div class="lbl">Rate ($/hr)</div><input id="t_rate" type="number" min="0" step="0.5" /></label>`
    : `<label class="field"><div class="lbl">Salary / week ($)</div><input id="t_sal" type="number" min="0" step="25" /></label>`;
  const list = (emps || []).length ? emps.map((u) => {
    const meta = u.pay_type === "hourly" ? `Hourly · ${money(Number(u.rate || 0))}/hr` : `Salary · ${money(Number(u.salary_per_period || 0))}/wk`;
    return `<div class="card thin">
      <div class="row"><div><div style="font-weight:700;">${esc(u.display_name)} ${u.active ? "" : '<span class="steel">(inactive)</span>'}</div>
        <div class="steel" style="font-size:13px;">@${esc(u.username)} · ${meta} · ${u.tax_pct || 0}% tax</div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn sm ghost" onclick='editPay(${esc(JSON.stringify(u))})'><span>Pay</span></button>
          <button class="btn sm ghost" onclick="resetPin('${u.id}','${esc(u.display_name)}')"><span>PIN</span></button>
          <button class="btn sm danger" onclick="toggleActive('${u.id}', ${u.active})"><span>${u.active ? "Disable" : "Enable"}</span></button>
        </div></div></div>`;
  }).join("") : emptyBox("No crew yet.");

  v.innerHTML = `${sec("Add crew member")}
    <div class="card">
      <div class="grid2">
        <label class="field"><div class="lbl">Display name</div><input id="t_name" placeholder="Full name" /></label>
        <label class="field"><div class="lbl">Username</div><input id="t_user" placeholder="lowercase, no spaces" /></label>
      </div>
      <label class="field"><div class="lbl">PIN (4–8 digits)</div><input id="t_pin" inputmode="numeric" placeholder="6 digits recommended" /></label>
      <div class="grid3">
        <label class="field"><div class="lbl">Pay type</div>
          <select id="t_type" onchange="TEAM_PAYTYPE=this.value; render()">
            <option value="hourly" ${TEAM_PAYTYPE === "hourly" ? "selected" : ""}>Hourly</option>
            <option value="salary" ${TEAM_PAYTYPE === "salary" ? "selected" : ""}>Salary</option>
          </select></label>
        ${payField}
        <label class="field"><div class="lbl">Tax withholding (%)</div><input id="t_tax" type="number" min="0" max="60" step="0.5" /></label>
      </div>
      <div id="t_err" class="err hidden"></div>
      <button class="btn" id="t_add"><span>Add crew member</span></button>
    </div>
    ${sec("Crew")}${list}`;
  $("t_add").onclick = addCrew;
}
async function addCrew() {
  const err = $("t_err"); const bad = (m) => { err.textContent = m; err.classList.remove("hidden"); };
  const body = {
    action: "create",
    display_name: $("t_name").value.trim(),
    username: $("t_user").value.trim().toLowerCase(),
    pin: $("t_pin").value.trim(),
    pay_type: TEAM_PAYTYPE,
    rate: TEAM_PAYTYPE === "hourly" ? Number($("t_rate")?.value || 0) : 0,
    salary_per_period: TEAM_PAYTYPE === "salary" ? Number($("t_sal")?.value || 0) : 0,
    tax_pct: Number($("t_tax").value || 0),
  };
  if (!body.display_name) return bad("Name required.");
  if (!/^[a-z0-9._-]{2,32}$/.test(body.username)) return bad("Username: 2–32 chars, a–z 0–9 . _ -");
  if (!/^\d{4,8}$/.test(body.pin)) return bad("PIN must be 4–8 digits.");
  $("t_add").disabled = true;
  try { await callFn(body); ping("Crew member added"); render(); }
  catch (e) { bad(e.message); $("t_add").disabled = false; }
}
function editPay(u) {
  const root = $("modal-root");
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="sec-title"><h2><span class="slash">/</span> ${esc(u.display_name)} — pay</h2></div>
    <label class="field"><div class="lbl">Pay type</div>
      <select id="e_type"><option value="hourly" ${u.pay_type === "hourly" ? "selected" : ""}>Hourly</option><option value="salary" ${u.pay_type === "salary" ? "selected" : ""}>Salary</option></select></label>
    <div class="grid2">
      <label class="field"><div class="lbl">Rate ($/hr)</div><input id="e_rate" type="number" min="0" step="0.5" value="${u.rate || 0}" /></label>
      <label class="field"><div class="lbl">Salary / week ($)</div><input id="e_sal" type="number" min="0" step="25" value="${u.salary_per_period || 0}" /></label>
    </div>
    <label class="field"><div class="lbl">Tax withholding (%)</div><input id="e_tax" type="number" min="0" max="60" step="0.5" value="${u.tax_pct || 0}" /></label>
    <div style="display:flex;gap:10px;">
      <button class="btn" onclick="savePay('${u.id}')"><span>Save</span></button>
      <button class="btn ghost" onclick="closeModal()"><span>Cancel</span></button>
    </div></div></div>`;
}
async function savePay(id) {
  const payload = {
    pay_type: $("e_type").value,
    rate: Number($("e_rate").value || 0),
    salary_per_period: Number($("e_sal").value || 0),
    tax_pct: Number($("e_tax").value || 0),
  };
  const { error } = await sb.from("profiles").update(payload).eq("id", id);
  if (error) return fail(error); closeModal(); ping("Pay updated"); render();
}
async function resetPin(id, name) {
  const pin = prompt(`New PIN for ${name} (4–8 digits):`);
  if (pin === null) return;
  if (!/^\d{4,8}$/.test(pin.trim())) return fail("PIN must be 4–8 digits.");
  try { await callFn({ action: "setpin", id, pin: pin.trim() }); ping("PIN reset"); }
  catch (e) { fail(e); }
}
async function toggleActive(id, active) {
  const { error } = await sb.from("profiles").update({ active: !active }).eq("id", id);
  if (error) return fail(error); ping(active ? "Disabled" : "Enabled"); render();
}

$("signout").onclick = signOut;
$("changepin").onclick = openPinChange;
$("loginPin").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
boot();
