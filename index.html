<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SIETE · Timesheet</title>
<!-- SIETE favicon + installable web app -->
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#C4222B" />
<meta name="application-name" content="SIETE Timesheet" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="SIETE Time" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,700;0,800;1,700;1,800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --red:#C4222B; --red-dark:#8E151C; --ink:#16181A; --steel:#6E7275;
    --line:#E3E1DD; --bg:#F4F3F0; --card:#FFFFFF; --ok:#1E7B3C; --warn:#B07A00;
  }
  *{box-sizing:border-box; border-radius:0;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:'Barlow',sans-serif; -webkit-font-smoothing:antialiased;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{width:100%; border:2px solid var(--line); padding:9px 10px;
    font-family:'Barlow',sans-serif; font-size:15px; color:var(--ink); background:#fff; outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--ink);}
  textarea{min-height:56px; resize:vertical;}
  .hidden{display:none !important;}

  .btn{border:2px solid var(--red); background:var(--red); color:#fff; font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:16px; letter-spacing:.08em; text-transform:uppercase; padding:10px 22px;
    transform:skewX(-10deg); transition:filter .15s;}
  .btn>span{display:inline-block; transform:skewX(10deg);}
  .btn:hover{filter:brightness(.88);}
  .btn.sm{font-size:14px; padding:5px 14px;}
  .btn.dark{background:var(--ink); border-color:var(--ink);}
  .btn.ok{background:var(--ok); border-color:var(--ok);}
  .btn.ghost{background:transparent; color:var(--ink); border-color:var(--ink);}
  .btn.danger{background:transparent; color:var(--red); border-color:var(--red);}
  .btn[disabled]{opacity:.45; cursor:not-allowed; filter:none;}
  .btn.full{width:100%;}

  .chip{display:inline-block; transform:skewX(-10deg); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:12px; letter-spacing:.08em; padding:2px 10px;}
  .chip>span{display:inline-block; transform:skewX(10deg);}
  .chip.draft{background:#EEF0F1; color:var(--steel);}
  .chip.submitted{background:#FFF4DB; color:var(--warn);}
  .chip.approved{background:#E2F2E6; color:var(--ok);}
  .chip.declined{background:#FBE3E4; color:var(--red);}
  .chip.paid{background:#EAEAEA; color:var(--steel);}

  .field{display:block; margin-bottom:14px;}
  .field .lbl{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:.12em;
    color:var(--steel); text-transform:uppercase; margin-bottom:4px;}
  .field .hint{font-size:12px; color:var(--steel); margin-top:3px;}

  .card{background:var(--card); border:1px solid var(--line); border-top:3px solid var(--ink); padding:18px; margin-bottom:16px;}
  .card.thin{border-top:3px solid var(--line); padding:14px;}
  .card.red{border-top:3px solid var(--red);}

  .sec-title{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; gap:12px;}
  .sec-title h2{font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; font-size:24px;
    text-transform:uppercase; letter-spacing:.02em; margin:0;}
  .sec-title h2 .slash{color:var(--red);}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  .row{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .steel{color:var(--steel);}
  .err{color:var(--red); font-size:13px; margin-bottom:10px;}
  .empty{border:2px dashed var(--line); padding:24px 18px; text-align:center; color:var(--steel); font-size:14px; margin-bottom:16px;}

  header{background:var(--ink); padding:14px 18px;}
  .head-in{max-width:1040px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;}
  .head-left{display:flex; align-items:center; gap:14px;}
  .head-tag{border-left:2px solid var(--red); padding-left:12px; font-family:'Barlow Condensed',sans-serif;
    font-style:italic; font-weight:700; font-size:16px; letter-spacing:.14em; color:#fff;}
  .signout{background:none; border:none; color:#9A9DA0; font-family:'Barlow Condensed',sans-serif;
    font-size:13px; letter-spacing:.1em; text-transform:uppercase; padding:0;}
  .tabs{background:#fff; border-bottom:1px solid var(--line);}
  .tabs-in{max-width:1040px; margin:0 auto; display:flex;}
  .tab{background:none; border:none; border-bottom:3px solid transparent; padding:12px 18px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--steel);}
  .tab.active{border-bottom-color:var(--red); color:var(--ink);}
  .tab .badge{margin-left:7px; background:var(--red); color:#fff; font-size:12px; padding:1px 7px;}
  main{max-width:1040px; margin:0 auto; padding:22px 18px 70px;}

  .weeknav{display:flex; align-items:center; justify-content:center; margin-bottom:14px; position:relative; z-index:20;}
  .week-selector{position:relative; width:min(100%,520px); text-align:center;}
  .week-select-btn{display:inline-flex; align-items:center; justify-content:center; gap:9px; max-width:100%; border:0; background:transparent;
    color:var(--ink); padding:2px 8px 4px; transition:color .15s, background .15s;}
  .week-select-btn:hover,.week-select-btn:focus-visible{color:var(--red); background:#fff; outline:2px solid var(--line); outline-offset:2px;}
  .week-select-btn .wk{font-family:'Barlow Condensed',sans-serif; font-weight:800; font-style:italic; font-size:24px;
    line-height:1.05; text-transform:uppercase;}
  .week-chevron{display:inline-grid; place-items:center; width:25px; height:25px; border:2px solid currentColor; font-family:'Barlow',sans-serif;
    font-size:17px; font-style:normal; font-weight:700; line-height:1; transition:transform .16s;}
  .week-select-btn[aria-expanded="true"] .week-chevron{transform:rotate(180deg);}
  .weeknav .sub{font-size:13px; color:var(--steel); margin-top:3px;}
  .week-menu-backdrop{position:fixed; inset:0; z-index:89; background:rgba(22,24,26,.42); backdrop-filter:blur(2px);}
  .week-menu{position:fixed; z-index:90; left:50%; right:auto; top:auto; bottom:0; transform:translateX(-50%);
    width:min(520px,100%); max-height:min(72vh,520px); overflow:auto; background:#fff; border:0; border-top:4px solid var(--red);
    border-radius:18px 18px 0 0; box-shadow:0 -10px 35px rgba(22,24,26,.22); padding:10px 12px calc(12px + env(safe-area-inset-bottom)); text-align:left;}
  .week-menu-title{padding:8px 10px 10px; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:18px;
    letter-spacing:.08em; text-transform:uppercase; color:var(--ink);}
  .week-menu-item{width:100%; border:0; border-bottom:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); padding:12px 10px;
    display:grid; grid-template-columns:24px minmax(0,1fr) auto; gap:9px; align-items:center; text-align:left;}
  .week-menu-item:last-of-type{border-bottom:0;}
  .week-menu-item:hover,.week-menu-item:focus-visible{background:#F7F6F3; outline:none;}
  .week-menu-item[disabled]{opacity:.38; cursor:not-allowed; background:#fff;}
  .week-menu-item.selected{background:#F7F6F3; box-shadow:inset 3px 0 0 var(--red);}
  .week-menu-icon{font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:18px; text-align:center;}
  .week-menu-label{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:.04em; text-transform:uppercase;}
  .week-menu-range{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--steel); white-space:nowrap;}
  .week-menu-cancel{width:100%; margin-top:8px; min-height:44px; border:1px solid var(--line); border-radius:9px; background:#F7F6F3; color:var(--ink);
    font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:15px; letter-spacing:.08em; text-transform:uppercase;}
  .week-menu-cancel:hover,.week-menu-cancel:focus-visible{border-color:var(--ink); outline:none;}

  .dayrail{position:relative; display:block; margin-bottom:16px;}
  .weekgrid{display:grid; grid-auto-flow:column; grid-auto-columns:minmax(210px,1fr); gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth; overscroll-behavior-x:contain; scrollbar-width:thin; padding:2px 2px 10px;}
  .weekgrid::-webkit-scrollbar{height:8px;}
  .weekgrid::-webkit-scrollbar-thumb{background:#C9C7C2;}
  .daycol{border:1px solid var(--line); border-top:3px solid var(--red); background:#fff; display:flex; flex-direction:column; min-height:120px; scroll-snap-align:start;}
  .daycol.today{min-width:clamp(320px,38vw,430px);}
  .daycol.weekend{border-top-color:var(--steel); background:#FAF9F7;}
  .daycol.today{border-top-color:var(--ink); box-shadow:inset 0 0 0 1px var(--ink);}
  .daycol h4{margin:0; padding:8px 9px; border-bottom:1px solid var(--line); font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:13px; letter-spacing:.06em; text-transform:uppercase; display:flex; justify-content:space-between; align-items:baseline; gap:4px;}
  .daycol h4 .dt{color:var(--steel); font-weight:500; font-size:11px;}
  .daycol h4 .tot{color:var(--red); font-family:'JetBrains Mono',monospace; font-size:11px;}
  .daybody{padding:8px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .linecard{border:1px solid var(--line); border-left:2px solid var(--red); padding:6px; display:flex; flex-direction:column; gap:5px;}
  .linecard input, .linecard textarea{font-size:13px; padding:6px 7px;}
  .linecard .hr{display:flex; gap:5px; align-items:center;}
  .linecard .hr input{width:100%;}
  .linecard .x{border:1px solid var(--line); background:#fff; color:var(--steel); font-weight:700; padding:0 9px; height:32px; flex:0 0 auto;}
  .linecard .x:hover{border-color:var(--red); color:var(--red);}
  .linecard textarea{min-height:38px;}
  .savemark{font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    min-height:13px; color:var(--ok); opacity:0; transition:opacity .2s;}
  .savemark.show{opacity:1;}
  .savemark.saving{color:var(--steel);}
  .addline{border:1px dashed var(--line); background:#fff; color:var(--steel); width:100%; padding:6px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase;}
  .addline:hover{border-color:var(--red); color:var(--red);}
  .lineread{font-size:12px;}
  .lineread .p{font-weight:700;}
  .lineread .h{font-family:'JetBrains Mono',monospace; color:var(--red);}
  .lineread .n{color:var(--steel); margin-top:2px;}

  @media (max-width:820px){
    .dayrail{display:block;}
    .weekgrid{grid-auto-columns:calc(100vw - 40px); gap:10px;}
    .daycol{min-height:0;}
    .daycol.today{min-width:0;}
    .linecard input, .linecard textarea, .lineread{font-size:15px;}
  }


  /* Day chooser and focused-entry improvements */
  .daypicker{display:flex; gap:7px; overflow-x:auto; padding:1px 1px 9px; margin:-2px 0 8px; scrollbar-width:none;}
  .daypicker::-webkit-scrollbar{display:none;}
  .daypick{flex:1 0 92px; border:1px solid var(--line); border-bottom:3px solid transparent; background:#fff; color:var(--steel); padding:8px 9px; text-align:left; transition:border-color .15s, background .15s, color .15s, transform .15s;}
  .daypick:hover{border-color:#B9B6B0; color:var(--ink); transform:translateY(-1px);}
  .daypick.on{border-color:var(--ink); border-bottom-color:var(--red); color:var(--ink); background:#fff;}
  .daypick.todaypick{box-shadow:inset 0 0 0 1px var(--ink);}
  .daypick.weekendpick{background:#FAF9F7;}
  .daypick .dp-top{display:flex; justify-content:space-between; align-items:center; gap:6px; font-family:'Barlow Condensed',sans-serif; font-weight:800; letter-spacing:.06em; text-transform:uppercase;}
  .daypick .dp-date{font-size:11px; color:var(--steel); margin-top:2px;}
  .daypick .dp-hours{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--red);}
  .todayflag{display:inline-block; background:var(--ink); color:#fff; padding:1px 6px; font-size:10px; letter-spacing:.08em;}
  .daycol.active-day{box-shadow:0 5px 18px rgba(22,24,26,.12), inset 0 0 0 1px var(--ink);}
  .daycol h4{position:sticky; top:0; z-index:2; background:inherit;}
  .hours-wrap{display:grid; grid-template-columns:minmax(0,1fr) auto; gap:5px; align-items:center;}
  .hours-unit{font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; color:var(--steel); text-transform:uppercase;}

  /* Compact time-entry summaries that expand only when editing */
  .entrycard{border:1px solid var(--line); border-left:3px solid var(--red); background:#fff; box-shadow:var(--sh-card);}
  .entrycard.open{border-color:#C7C4BE; box-shadow:var(--sh-2);}
  .entrysummary{width:100%; border:0; background:#fff; color:var(--ink); padding:10px; display:grid; grid-template-columns:minmax(0,1fr) auto auto; gap:9px; align-items:center; text-align:left;}
  .entrysummary:hover{background:#FAF9F7;}
  .entry-main{min-width:0;}
  .entry-project{font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .entry-note{font-size:12px; color:var(--steel); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
  .entry-note.missing{color:var(--warn); font-style:italic;}
  .entry-hours{font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--red); white-space:nowrap;}
  .entry-chevron{font-size:18px; color:var(--steel); line-height:1; transform:rotate(0deg); transition:transform .15s;}
  .entrycard.open .entry-chevron{transform:rotate(180deg);}
  .entryedit{display:none; border-top:1px solid var(--line); padding:10px; background:#FCFBF9;}
  .entrycard.open .entryedit{display:block;}
  .entryedit .field{margin-bottom:9px;}
  .entryedit .field:last-of-type{margin-bottom:7px;}
  .entry-actions{display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:7px;}
  .entry-remove{border:1px solid var(--red); background:#fff; color:var(--red); font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:7px 11px; min-height:36px;}
  .entry-remove:hover{background:#FFF4F4;}
  .entry-done{border:1px solid var(--ink); background:var(--ink); color:#fff; padding:5px 12px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
  .day-empty{border:1px dashed var(--line); padding:16px 10px; text-align:center; color:var(--steel); font-size:12px;}
  @media (max-width:820px){
    .daypicker{margin-bottom:6px;}
    .daypick{flex-basis:78px; padding:7px;}
    .daypick .dp-hours{display:none;}
    .dayrail{display:block;}
  }

  .seg{display:flex; gap:8px; margin-bottom:14px;}
  .seg button{flex:1; padding:9px 0; border:2px solid var(--line); background:#fff; color:var(--steel);
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; letter-spacing:.08em; text-transform:uppercase;}
  .seg button.on{border-color:var(--ink); background:var(--ink); color:#fff;}

  .stub-row{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line);}
  .stub-row .l{font-size:14px; color:var(--steel);}
  .stub-row .v{font-family:'JetBrains Mono',monospace; font-weight:500; font-size:14px;}
  .stub-row.bold .l{color:var(--ink); font-weight:700;}
  .stub-row.bold .v{font-weight:700; font-size:18px;}
  .v.red{color:var(--red);}

  .banner{padding:12px 14px; margin-bottom:14px; border:1px solid var(--line); font-size:14px;}
  .banner.dismissible{display:flex; justify-content:space-between; align-items:center; gap:12px;}
  .banner-dismiss{flex:0 0 auto; border:0; background:transparent; color:var(--ink); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:.06em; text-transform:uppercase; padding:7px 4px;}
  .banner-dismiss .xmark{color:var(--red); font-size:20px; vertical-align:-2px; margin-right:4px;}
  .week-actions{max-width:520px; margin:0 auto 14px;}
  .week-actions .btn{width:100%;}
  .statbar.single{grid-template-columns:minmax(0,240px); margin-bottom:14px;}
  .banner.warn{background:#FFF6E0; border-color:#EACB7A;}
  .banner.bad{background:#FBE3E4; border-color:#E9B4B7;}
  .banner.good{background:#E6F3EA; border-color:#AFD8BB;}

  .totals{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; text-align:center;}
  .totals .k{font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:.14em; color:#9A9DA0; text-transform:uppercase;}
  .totals .val{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; margin-top:3px;}

  .modal-bg{position:fixed; inset:0; background:rgba(22,24,26,.55); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50;}
  .modal{background:#fff; max-width:440px; width:100%; border-top:4px solid var(--red); padding:20px;}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) skewX(-10deg); background:var(--ink); color:#fff;
    padding:10px 22px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.08em; font-size:15px;
    box-shadow:0 4px 14px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:opacity .2s; z-index:60;}
  .toast.show{opacity:1;}
  .toast.bad{background:var(--red-dark);}
  .toast>span{display:inline-block; transform:skewX(10deg);}

  .spinner{min-height:100vh; display:grid; place-items:center;}

  @media (max-width:600px){
    .grid3{grid-template-columns:1fr;}
    .totals{grid-template-columns:1fr 1fr;}
    .head-tag{display:none;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}

  /* ---- official logo + polish pass ---- */
  :root{
    --sh-1:0 1px 2px rgba(22,24,26,.06), 0 1px 3px rgba(22,24,26,.08);
    --sh-2:0 4px 14px rgba(22,24,26,.10);

  .logo.head{width:118px; height:26px;}
  .logo.login{width:190px; height:38px; background-position:left center;}
  .logo.boot{width:150px; height:34px; margin:0 auto; background-position:center;}

  .card{box-shadow:var(--sh-card);}
  .btn{box-shadow:var(--sh-1);}
  .btn:active{transform:skewX(-10deg) translateY(1px);}
  :focus-visible{outline:2px solid var(--ink); outline-offset:2px;}
  header{box-shadow:0 2px 0 var(--red), 0 3px 10px rgba(22,24,26,.18);}

  /* summary stat bar */
  .statbar{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:18px;}
  .stat{background:#fff; border:1px solid var(--line); border-top:3px solid var(--ink); padding:14px 16px; box-shadow:var(--sh-card);}
  .stat.red{border-top-color:var(--red);}
  .stat.ok{border-top-color:var(--ok);}
  .stat.warn{border-top-color:var(--warn);}
  .stat .k{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--steel);}
  .stat .v{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:26px; line-height:1.1; margin-top:4px; color:var(--ink);}
  .stat .v.small{font-size:18px; padding-top:5px;}
  .stat .sub{font-size:12px; color:var(--steel); margin-top:3px;}
  .ot{display:inline-block; transform:skewX(-10deg); background:#FFF0D6; color:var(--warn); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:.08em; padding:1px 9px; margin-left:6px;}
  .ot>span{display:inline-block; transform:skewX(10deg);}

  /* skeleton loading */
  @keyframes shimmer{100%{background-position:-200% 0;}}
  .skel{background:linear-gradient(90deg,#ECEAE6 25%,#F5F3F0 37%,#ECEAE6 63%); background-size:200% 100%; animation:shimmer 1.3s linear infinite;}
  .skelcard{background:#fff; border:1px solid var(--line); border-top:3px solid var(--line); padding:18px; margin-bottom:16px; box-shadow:var(--sh-card);}
  .skel-line{height:12px; margin:8px 0;}
  @media (prefers-reduced-motion:reduce){.skel{animation:none;}}



  /* ---- streamlined mobile timesheet experience ---- */
  .week-header{display:flex; align-items:flex-start; justify-content:center; gap:14px; margin-bottom:12px;}
  .week-header .weeknav{margin:0; flex:1; max-width:560px;}
  .week-header .week-actions{margin:0; width:auto; min-width:230px;}
  .week-header .week-actions .btn{width:100%; min-height:44px; padding:9px 18px;}
  .weeknav .sub strong{color:var(--ink); font-weight:700;}

  .daypicker-shell{position:sticky; top:0; z-index:14; margin:0 -4px 10px; padding:7px 4px 2px; background:linear-gradient(var(--bg) 78%,rgba(244,243,240,0));}
  .daypicker{margin:0; padding:1px 1px 8px; align-items:stretch;}
  .daypick{flex:0 0 88px; min-height:78px; border:1px solid var(--line); border-radius:10px; padding:8px 9px; box-shadow:var(--sh-1); transition:flex-basis .18s, transform .15s, border-color .15s, box-shadow .15s;}
  .daypick.on{flex-basis:122px; border-color:var(--ink); border-bottom-color:var(--red); box-shadow:var(--sh-2);}
  .daypick .dp-top{font-size:14px;}
  .daypick .dp-date{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink); margin-top:3px;}
  .daypick .dp-status{margin-top:6px; font-size:11px; color:var(--steel); white-space:nowrap;}
  .daypick .dp-status.complete{color:var(--ok); font-weight:700;}
  .daypick .dp-status.partial{color:var(--ink);}
  .daypick .dp-status.issue{color:var(--red); font-weight:700;}
  .daypick .issue-dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--red); margin-right:5px; vertical-align:1px;}
  .todayflag{border-radius:999px; padding:2px 7px; text-transform:none; letter-spacing:.02em;}

  .dayrail{margin-bottom:82px;}
  .weekgrid{grid-auto-columns:minmax(280px,1fr); padding:2px 2px 16px;}
  .daycol{border:0; border-top:3px solid var(--line); border-radius:12px; background:#fff; min-height:0; overflow:visible; box-shadow:var(--sh-card);}
  .daycol.today{border-top-color:var(--ink); min-width:0;}
  .daycol.active-day{min-width:clamp(390px,48vw,560px); border-top-color:var(--red); box-shadow:var(--sh-2);}
  .daycol h4{position:static; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:3px 12px; align-items:center; padding:14px 16px 12px; border-bottom:1px solid var(--line); border-radius:9px 9px 0 0; background:#fff;}
  .daycol h4 .day-title{font-size:18px; letter-spacing:.04em;}
  .daycol h4 .dt{font-size:12px; justify-self:end;}
  .daycol h4 .day-progress{grid-column:1 / -1; display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:3px;}
  .daycol h4 .tot{font-size:12px; color:var(--red);}
  .daycol h4 .remaining{font-family:'Barlow',sans-serif; font-size:12px; font-weight:500; letter-spacing:0; text-transform:none; color:var(--steel);}
  .daycol h4 .remaining.complete{color:var(--ok); font-weight:700;}
  .daybody{padding:14px; gap:12px;}

  .entrycard{position:relative; border:0; border-left:4px solid var(--red); border-radius:10px; box-shadow:var(--sh-card); overflow:visible;}
  .entrycard.open{border-color:var(--red); box-shadow:var(--sh-2);}
  .entrysummary{position:relative; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:5px; align-items:center; padding:0; border-radius:10px;}
  .entry-toggle{min-width:0; width:100%; border:0; background:transparent; color:var(--ink); padding:13px 7px 13px 14px; display:grid; grid-template-columns:minmax(0,1fr) auto auto; gap:10px; align-items:center; text-align:left; border-radius:10px;}
  .entry-toggle:hover{background:#FAF9F7;}
  .entry-main{display:block; min-width:0;}
  .entry-project{display:block; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .entry-note{display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2; white-space:normal; line-height:1.3; overflow:hidden; font-size:13px; margin-top:3px;}
  .entry-hours{font-size:13px;}
  .entry-menu-btn{width:40px; height:42px; border:0; background:transparent; color:var(--steel); font-size:24px; line-height:1; border-radius:8px;}
  .entry-menu-btn:hover,.entry-menu-btn:focus-visible{background:#F2F1EE; color:var(--ink); outline:none;}
  .entry-menu{position:absolute; z-index:20; right:7px; top:49px; width:178px; padding:5px; border:1px solid var(--line); border-radius:9px; background:#fff; box-shadow:var(--sh-2);}
  .entry-menu button{display:block; width:100%; border:0; border-radius:6px; background:#fff; color:var(--ink); padding:10px 11px; text-align:left; font-size:14px;}
  .entry-menu button:hover{background:#F5F4F1;}
  .entry-menu button.danger{color:var(--red);}
  .entryedit{border-top:1px solid var(--line); padding:14px; border-radius:0 0 10px 10px; background:#FCFBF9;}
  .entryedit .lbl{font-family:'Barlow',sans-serif; font-size:14px; font-weight:600; letter-spacing:0; text-transform:none; color:var(--ink); margin-bottom:6px;}
  .entryedit input,.entryedit textarea{border:1px solid #D4D2CD; border-radius:8px; padding:11px 12px; font-size:16px; background:#fff;}
  .entryedit textarea{min-height:92px;}
  .entry-actions{justify-content:flex-end; margin-top:11px;}
  .entry-done{border-radius:7px; min-height:39px; padding:8px 17px;}
  .entry-remove{display:none;}
  .hours-wrap{grid-template-columns:minmax(0,180px) auto; gap:9px; justify-content:start;}
  .hours-unit{text-transform:none; font-size:14px;}
  .savemark{font-family:'Barlow',sans-serif; letter-spacing:0; text-transform:none; text-align:right;}
  .day-empty{border-radius:8px;}

  .floating-add{position:fixed; z-index:35; right:max(20px,calc((100vw - 1040px)/2 + 20px)); bottom:calc(22px + env(safe-area-inset-bottom)); display:inline-flex; align-items:center; gap:9px; min-height:52px; border:0; border-radius:999px; background:var(--red); color:#fff; padding:0 20px; box-shadow:0 7px 22px rgba(22,24,26,.25); font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:16px; letter-spacing:.06em; text-transform:uppercase;}
  .floating-add:hover{filter:brightness(.9);}
  .floating-add .fab-plus{font-family:'Barlow',sans-serif; font-size:28px; font-weight:500; line-height:1;}
  .global-save-state{position:fixed; z-index:36; left:50%; bottom:calc(28px + env(safe-area-inset-bottom)); transform:translate(-50%,10px); border-radius:999px; background:var(--ink); color:#fff; padding:8px 14px; font-size:13px; box-shadow:var(--sh-2); opacity:0; pointer-events:none; transition:opacity .18s, transform .18s;}
  .global-save-state.show{opacity:1; transform:translate(-50%,0);}
  .global-save-state.saving{background:var(--steel);}

  @media (max-width:820px){
    main{padding-top:16px;}

  /* ---- admin team operations dashboard ---- */
  .team-toolbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:14px; flex-wrap:wrap;}
  .team-toolbar-copy{font-size:14px; color:var(--steel);}
  .team-toolbar .sec-title{width:100%; margin:0;}
  .team-filters{display:flex; gap:7px; overflow-x:auto; padding:2px 1px 7px; margin-bottom:15px; scrollbar-width:none;}
  .team-filters::-webkit-scrollbar{display:none;}
  .team-filter{flex:0 0 auto; border:1px solid var(--line); border-radius:999px; background:#fff; color:var(--steel); padding:8px 13px; font-family:'Barlow',sans-serif; font-weight:600; font-size:13px; box-shadow:var(--sh-1);}
  .team-filter:hover{border-color:var(--ink); color:var(--ink);}
  .team-filter.on{border-color:var(--ink); background:var(--ink); color:#fff;}
  .team-filter-count{display:inline-flex; align-items:center; justify-content:center; min-width:21px; height:21px; margin-left:6px; padding:0 6px; border-radius:999px; background:#F0EFEC; color:var(--steel); font-family:'JetBrains Mono',monospace; font-size:10px;}
  .team-filter.on .team-filter-count{background:rgba(255,255,255,.17); color:#fff;}

  .team-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-bottom:22px;}
  .team-card{background:#fff; border:1px solid var(--line); border-top:3px solid var(--ink); border-radius:11px; padding:17px; box-shadow:var(--sh-card); min-width:0;}
  .team-card.submitted{border-top-color:var(--warn);}
  .team-card.declined{border-top-color:var(--red);}
  .team-card.approved,.team-card.paid{border-top-color:var(--ok);}
  .team-card.inactive{opacity:.62;}
  .team-card-head{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
  .team-person{display:flex; align-items:center; gap:11px; min-width:0;}
  .team-avatar{flex:0 0 42px; width:42px; height:42px; display:grid; place-items:center; border-radius:50%; background:#F0EFEC; color:var(--ink); font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:17px; letter-spacing:.04em;}
  .team-name{font-weight:700; font-size:17px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .team-meta{font-size:12px; color:var(--steel); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .team-status{flex:0 0 auto; display:inline-flex; align-items:center; min-height:27px; border-radius:999px; padding:5px 9px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; letter-spacing:.07em; text-transform:uppercase; background:#EEF0F1; color:var(--steel);}
  .team-status.submitted{background:#FFF4DB; color:var(--warn);}
  .team-status.declined{background:#FBE3E4; color:var(--red);}
  .team-status.approved{background:#E2F2E6; color:var(--ok);}
  .team-status.paid{background:#E8F1EA; color:var(--ok);}
  .team-hours{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-top:18px;}
  .team-hours-label{font-size:13px; color:var(--steel);}
  .team-hours-value{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:29px; line-height:1; color:var(--ink); white-space:nowrap;}
  .team-hours-value span{font-family:'Barlow',sans-serif; font-size:13px; font-weight:600; color:var(--steel);}
  .team-hours-value.complete{color:var(--ok);}
  .team-hours-value.overtime{color:var(--warn);}
  .team-hours-note{text-align:right; font-size:12px; color:var(--steel); margin-top:5px;}
  .team-hours-note.complete{color:var(--ok); font-weight:600;}
  .team-hours-note.overtime{color:var(--warn); font-weight:600;}
  .team-progress{height:6px; margin-top:10px; overflow:hidden; border-radius:999px; background:#EEECE8;}
  .team-progress span{display:block; height:100%; width:var(--progress,0%); max-width:100%; border-radius:inherit; background:var(--ink);}
  .team-progress.complete span{background:var(--ok);}
  .team-progress.overtime span{background:var(--warn);}
  .team-card-actions{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); flex-wrap:wrap;}
  .team-card-actions .primary{flex:1 1 170px; min-height:40px;}
  .team-card-actions .edit-member{flex:0 0 auto; min-height:40px;}

  .team-edit-modal{max-width:470px; border-radius:12px; padding:0; overflow:hidden;}
  .team-edit-head{display:flex; align-items:flex-start; justify-content:space-between; gap:14px; padding:18px 20px 15px; border-bottom:1px solid var(--line);}
  .team-edit-name{font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; font-size:25px; line-height:1.05; text-transform:uppercase;}
  .team-edit-sub{font-size:13px; color:var(--steel); margin-top:4px;}
  .team-edit-list{display:grid; gap:9px; padding:16px 20px 20px;}
  .team-edit-action{width:100%; display:flex; align-items:center; justify-content:space-between; gap:14px; border:1px solid var(--line); border-radius:9px; background:#fff; color:var(--ink); padding:13px 14px; text-align:left;}
  .team-edit-action:hover{border-color:var(--ink); box-shadow:var(--sh-1);}
  .team-edit-action strong{display:block; font-size:15px;}
  .team-edit-action small{display:block; color:var(--steel); font-size:12px; margin-top:2px;}
  .team-edit-action .arrow{font-size:20px; color:var(--steel);}
  .team-edit-action.danger{border-color:#F0C6C8; color:var(--red);}
  .team-edit-action.danger small,.team-edit-action.danger .arrow{color:var(--red);}
  .profile-readonly{background:#F5F4F1; color:var(--steel);}

  details.team-add-panel{background:#fff; border:1px solid var(--line); border-top:3px solid var(--ink); border-radius:10px; box-shadow:var(--sh-card); margin-bottom:18px;}
  details.team-add-panel summary{cursor:pointer; list-style:none; padding:15px 17px; font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; font-size:20px; letter-spacing:.02em; text-transform:uppercase;}
  details.team-add-panel summary::-webkit-details-marker{display:none;}
  details.team-add-panel summary::after{content:'+'; float:right; color:var(--red); font-style:normal;}
  details.team-add-panel[open] summary::after{content:'−';}
  .team-add-body{padding:3px 17px 18px; border-top:1px solid var(--line);}

  .team-timesheet-modal{max-width:780px; max-height:min(88vh,900px); overflow:auto; border-radius:12px; padding:0; border-top:4px solid var(--red);}
  .review-modal-head{position:sticky; top:0; z-index:3; display:flex; align-items:flex-start; justify-content:space-between; gap:15px; padding:18px 20px 15px; background:#fff; border-bottom:1px solid var(--line);}
  .review-modal-title{font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:800; font-size:25px; text-transform:uppercase;}
  .review-modal-sub{font-size:13px; color:var(--steel); margin-top:3px;}
  .modal-close{flex:0 0 40px; width:40px; height:40px; border:0; border-radius:50%; background:#F2F1EE; color:var(--ink); font-size:24px; line-height:1;}
  .review-modal-body{padding:18px 20px 22px;}
  .review-week-row{display:grid; grid-template-columns:minmax(210px,1fr) auto auto; align-items:end; gap:12px; margin-bottom:16px;}
  .review-week-row .field{margin:0;}
  .review-total{text-align:right;}
  .review-total .k{font-size:11px; color:var(--steel); text-transform:uppercase; letter-spacing:.08em;}
  .review-total .v{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:24px; margin-top:3px;}
  .review-days{display:grid; gap:9px;}
  .review-day{border:1px solid var(--line); border-radius:9px; background:#fff; overflow:hidden;}
  .review-day-head{display:flex; justify-content:space-between; gap:12px; padding:10px 12px; background:#F8F7F4; border-bottom:1px solid var(--line);}
  .review-day-title{font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:15px; letter-spacing:.04em; text-transform:uppercase;}
  .review-day-total{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; color:var(--red);}
  .review-line{display:grid; grid-template-columns:minmax(0,1fr) auto; gap:14px; padding:10px 12px; border-bottom:1px solid var(--line);}
  .review-line:last-child{border-bottom:0;}
  .review-project{font-weight:700; font-size:14px;}
  .review-notes{font-size:13px; color:var(--steel); margin-top:2px; line-height:1.35;}
  .review-line-hours{font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--ink); white-space:nowrap;}
  .review-empty{padding:11px 12px; color:var(--steel); font-size:13px;}
  .review-actions{position:sticky; bottom:0; display:flex; gap:9px; padding:14px 20px calc(14px + env(safe-area-inset-bottom)); background:rgba(255,255,255,.96); border-top:1px solid var(--line); backdrop-filter:blur(10px);}

  @media (max-width:820px){
    .team-grid{grid-template-columns:1fr;}
    .team-card{padding:15px;}
    .review-week-row{grid-template-columns:1fr 1fr;}
    .review-week-row .field{grid-column:1 / -1;}
    .team-timesheet-modal{max-height:94vh; border-radius:12px 12px 0 0; align-self:flex-end;}
    .modal-bg:has(.team-timesheet-modal){align-items:flex-end; padding:0;}
  }
  @media (max-width:520px){
    .team-card-head{display:block;}
    .team-status{margin-top:10px;}
    .team-card-actions{align-items:stretch;}
    .team-card-actions .primary{flex:1 1 auto;}
    .team-card-actions .edit-member{flex:0 0 auto;}
    .team-edit-modal{width:100%; max-width:none; border-radius:12px 12px 0 0; align-self:flex-end;}
    .modal-bg:has(.team-edit-modal){align-items:flex-end; padding:0;}
    .review-modal-head{padding:15px 16px 13px;}
    .review-modal-body{padding:14px 16px 18px;}
    .review-week-row{grid-template-columns:1fr;}
    .review-total{text-align:left;}
    .review-actions{padding-left:16px; padding-right:16px;}
    .review-actions .btn{flex:1; padding-left:10px; padding-right:10px;}
  }


  /* ---- receipt photos ---- */
  .receipt-note{margin:0 0 11px; font-size:13px; border-radius:9px;}
  .receipt-add{width:100%; border:1px dashed var(--line); border-radius:9px; background:#fff; color:var(--steel);
    padding:12px; min-height:46px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px;
    letter-spacing:.06em; text-transform:uppercase; transition:border-color .15s, color .15s;}
  .receipt-add:hover{border-color:var(--red); color:var(--red);}
  .receipt-add .cam{font-size:17px; margin-right:6px;}
  .receipt-thumbs{display:flex; flex-wrap:wrap; gap:8px; margin-top:9px;}
  .receipt-thumbs:empty{margin-top:0;}
  .rthumb{position:relative; width:78px; height:78px; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#FAF9F7;}
  .rthumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .rthumb-x{position:absolute; top:2px; right:2px; width:22px; height:22px; border:0; border-radius:50%;
    background:rgba(22,24,26,.72); color:#fff; font-size:15px; line-height:1; display:grid; place-items:center;}
  .rthumb-x:hover{background:var(--red);}
  .receipt-tag{display:inline-flex; align-items:center; gap:6px; border-radius:7px; font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase; padding:5px 10px; min-height:30px;}
  .receipt-tag.has{border:1px solid var(--line); background:#fff; color:var(--ink);}
  .receipt-tag.has:hover{border-color:var(--red); color:var(--red);}
  .receipt-tag.none{background:#FFF0D6; color:var(--warn);}
  .receipt-tag .cam{font-size:14px;}
  .receipt-modal{max-width:560px;}
  .receipt-full{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;
    margin-bottom:14px; max-height:56vh; overflow:auto;}
  .receipt-full img{width:100%; border:1px solid var(--line); border-radius:8px; display:block;}

  /* ---- requests page ---- */
  .reqpage .card{border-radius:12px; padding:16px;}
  .reqpage .seg button{border-radius:9px; min-height:44px;}
  .reqpage .field .lbl{font-family:'Barlow',sans-serif; font-size:14px; font-weight:600;
    letter-spacing:0; text-transform:none; color:var(--ink); margin-bottom:6px;}
  .reqpage input,.reqpage textarea{border:1px solid #D4D2CD; border-radius:9px; padding:11px 12px; font-size:16px;}
  .reqpage .btn{min-height:46px;}
  .reqrow{background:#fff; border-left:4px solid var(--red); border-radius:10px; box-shadow:var(--sh-card);
    padding:13px 14px; margin-bottom:10px;}
  .reqrow.perdiem{border-left-color:var(--steel);}
  .reqrow-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .reqrow-kind{font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:13px;
    letter-spacing:.06em; text-transform:uppercase; color:var(--red);}
  .reqrow.perdiem .reqrow-kind{color:var(--steel);}
  .reqrow-amt{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px;}
  .reqrow-meta{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--steel); margin-top:2px;}
  .reqrow-note{font-size:13.5px; color:var(--steel); margin-top:7px; line-height:1.35;}
  .reqrow-foot{display:flex; align-items:center; margin-top:9px;}
  @media (max-width:820px){
    .receipt-add{min-height:52px;}
    .rthumb{width:86px; height:86px;}
  }

  /* ============ DESKTOP: a real seven-day week, no rail ============ */
  .addline{display:none;}   /* mobile adds lines with the FAB */

  @media (min-width:821px){
    main{max-width:1240px;}
    .head-in,.tabs-in{max-width:1240px;}
    .daypicker-shell{display:none;}          /* every day is visible; the picker is a phone affordance */
    .dayrail{margin-bottom:20px;}
    .weekgrid{grid-auto-flow:row; grid-template-columns:repeat(7,minmax(0,1fr)); grid-auto-columns:auto;
      overflow:visible; scroll-snap-type:none; gap:9px; padding:2px 0 0;}
    .daycol{scroll-snap-align:none; min-width:0; border-top-color:var(--line);}
    .daycol.today{border-top-color:var(--red);}
    .daycol.active-day{min-width:0; border-top-color:var(--line); box-shadow:var(--sh-card);}
    .daycol.active-day.today{border-top-color:var(--red);}
    .daycol:hover{box-shadow:var(--sh-2);}
    .daycol h4{padding:11px 12px 10px; grid-template-columns:minmax(0,1fr) auto; gap:2px 8px;}
    .daycol h4 .day-title{font-size:14px; letter-spacing:.06em;}
    .daycol h4 .dt{font-size:11px;}
    .daycol h4 .day-progress{margin-top:4px; flex-direction:column; align-items:flex-start; gap:1px;}
    .daycol h4 .tot,.daycol h4 .remaining{font-size:11px;}
    .daybody{padding:9px; gap:8px;}

    /* compact cards; the editor is a modal at this width */
    .entrycard .entryedit{display:none !important;}
    .entrysummary{grid-template-columns:minmax(0,1fr) auto;}
    .entry-toggle{padding:10px 4px 10px 10px; grid-template-columns:minmax(0,1fr) auto; gap:5px;}
    .entry-project{font-size:13.5px;}
    .entry-note{font-size:12px;}
    .entry-hours{font-size:12px; align-self:start; padding-top:1px;}
    .entry-chevron{display:none;}
    .entry-menu-btn{width:30px; height:34px; font-size:19px;}
    .entry-menu{top:40px; right:4px; width:168px;}
    .day-empty{padding:12px 8px;}
    .addline{display:block; border-radius:8px; padding:8px; font-size:12px;}
    .floating-add{display:none;}             /* per-column add buttons instead */
    .week-header .week-actions{min-width:210px;}
  }

  /* ---- reports ---- */
  .rpt-controls .hint{margin-top:5px;}
  .rpt-note{font-size:13px; border-radius:9px;}
  .rpt-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin:4px 0 10px; flex-wrap:wrap;}
  .rpt-scroll{overflow-x:auto; border:1px solid var(--line); border-top:3px solid var(--ink); background:#fff; box-shadow:var(--sh-card);}
  .rpt-table{width:100%; border-collapse:collapse; font-size:13px; white-space:nowrap;}
  .rpt-table th{position:sticky; top:0; background:#F7F6F3; border-bottom:2px solid var(--line); text-align:left;
    padding:9px 11px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px;
    letter-spacing:.08em; text-transform:uppercase; color:var(--steel);}
  .rpt-table td{border-bottom:1px solid var(--line); padding:8px 11px; vertical-align:top;}
  .rpt-table td.num{font-family:'JetBrains Mono',monospace; text-align:right;}
  .rpt-table tbody tr:hover{background:#FAF9F7;}
  .rpt-table tbody tr:last-child td{border-bottom:0;}
  .rpt-table td:nth-child(1){font-weight:600;}
  @media (max-width:820px){
    .rpt-controls .grid3,.rpt-controls .grid2{grid-template-columns:1fr; gap:0;}
    .rpt-table{font-size:12px;}
    .rpt-head{gap:8px;}
  }

  /* ---- projects ---- */
  .proj-select{width:100%;}
  .entry-project.missing{color:var(--red); font-weight:600;}
  .projrow{background:#fff; border-left:4px solid var(--red); border-radius:10px; box-shadow:var(--sh-card);
    padding:13px 14px; margin-bottom:10px;}
  .projrow.archived{border-left-color:var(--steel); opacity:.72;}
  .projnum{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; color:var(--red);}
  .projrow.archived .projnum{color:var(--steel);}
  .projname{font-weight:700; font-size:15px; margin-top:2px; overflow:hidden; text-overflow:ellipsis;}
  .projclient{font-size:13px; color:var(--steel); margin-top:2px;}
  .tabs-in{overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .tabs-in::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;}
  @media (max-width:820px){
    .tab{padding:12px 14px; font-size:15px;}
  }

  /* ---- charge codes + stubs + row actions ---- */
  .codechip{display:inline-block; margin-top:3px; background:#EEF0F1; color:var(--steel);
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:10px; letter-spacing:.04em;
    padding:1px 6px; border-radius:4px;}
  .codechip.missing{background:#FBE3E4; color:var(--red);}
  .codedesc{font-size:12px; color:var(--steel); margin-top:4px; line-height:1.35;}
  .reqrow-foot{justify-content:space-between; flex-wrap:wrap; gap:8px;}
  .reqrow-actions{display:flex; gap:6px; margin-left:auto;}
  .stubrow{width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#fff; border:0; border-left:4px solid var(--ok); border-radius:10px; box-shadow:var(--sh-card);
    padding:13px 14px; margin-bottom:9px; text-align:left; transition:box-shadow .15s;}
  .stubrow:hover{box-shadow:var(--sh-2);}
  .stubdate{font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:16px; letter-spacing:.04em;}
  .stubmeta{font-size:12px; color:var(--steel); margin-top:2px;}
  .stubnet{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; white-space:nowrap;}
  .stubchev{color:var(--steel); font-weight:400; margin-left:4px;}
</style>
</head>

<div id="boot" class="spinner"><div class="logo boot"></div></div>

<!-- LOGIN -->
<div id="login" class="hidden" style="min-height:100vh; background:var(--ink);">
  <div style="max-width:380px; margin:0 auto; padding:70px 20px;">
    <div style="margin-bottom:34px;">
      <div class="logo login"></div>
      <div style="margin-top:14px; font-family:'Barlow Condensed',sans-serif; font-style:italic; font-weight:700; font-size:23px; letter-spacing:.16em; color:#fff;">TIMESHEET</div>
    </div>
    <div style="background:#fff; padding:22px; border-top:4px solid var(--red);">
      <label class="field"><div class="lbl">Account</div><select id="loginUser"></select></label>
      <label class="field"><div class="lbl">PIN</div>
        <input id="loginPin" type="password" inputmode="numeric" placeholder="••••••" />
      </label>
      <div id="loginErr" class="err hidden"></div>
      <button class="btn full" id="loginBtn"><span>Log in</span></button>
    </div>
  </div>

<script>
/* ============================================================
   SIETE Crew Ledger — Supabase-backed client
   ============================================================ */
const CFG = window.SIETE_CONFIG || {};
const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);

let ME = null;     // profile row
let TAB = null;
let WEEK = null;   // employee: current week_start (Monday, YYYY-MM-DD)
let ACTIVE_DAY = null; // preserves the selected day while entries auto-save and re-render
const EXPANDED_ENTRIES = new Set(); // keeps entry editors open through auto-save re-renders
let AUTO_EXPANDED_WEEK = null; // opens the first entry on the active day once per week

/* ---------- utils ---------- */
const $ = (id) => document.getElementById(id);
const money = (n) => (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const WEEK_ENTRIES = new Map();   // id -> entry, so the desktop editor can read it
const PENDING_SAVES = new Set();  // in-flight writes, so we never render mid-save
const isDesktop = () => window.matchMedia("(min-width:821px)").matches;

/* ---------- projects ---------- */
let PROJECTS = [];
let LAST_PROJECT_ID = null;   // prefill for the next line added
const PROJ = new Map();
async function loadProjects() {
  const { data, error } = await sb.from("projects").select("*").order("number");
  PROJECTS = error ? [] : (data || []);
  PROJ.clear();
  PROJECTS.forEach((p) => PROJ.set(p.id, p));
}
const projLabel = (p) => `${p.number} · ${p.name}`;

/* ---------- charge codes ----------
   The project answers "which job ate this cost". The charge code answers
   "what kind of labor was it" — which is the split an accountant needs. */
let CODES = [];
let LAST_CODE_ID = null;
const CODE = new Map();
async function loadCodes() {
  const { data, error } = await sb.from("charge_codes").select("*").order("sort").order("code");
  CODES = error ? [] : (data || []);
  CODE.clear();
  CODES.forEach((c) => CODE.set(c.id, c));
}
const codeLabel = (c) => `${c.code} · ${c.name}`;
const defaultCodeId = () => (CODES.find((c) => c.status === "active") || {}).id || null;
function codeDisplay(e) {
  const c = e.charge_code_id ? CODE.get(e.charge_code_id) : null;
  return c ? c.code : "";
}
function codeOptions(selectedId) {
  const list = CODES.filter((c) => c.status === "active" || c.id === selectedId);
  return `<option value="">— Select work type —</option>` +
    list.map((c) => `<option value="${c.id}"${c.id === selectedId ? " selected" : ""}>${esc(codeLabel(c))}${c.status === "archived" ? " (archived)" : ""}</option>`).join("");
}
/* Entries keep a text snapshot of the name, so old rows and any pre-projects
   data still read correctly even though reports group on project_id. */
function projDisplay(e) {
  const p = e.project_id ? PROJ.get(e.project_id) : null;
  if (p) return projLabel(p);
  if (e.project && e.project.trim()) return e.project.trim();
  return "";
}
function projectOptions(selectedId, legacyText) {
  const active = PROJECTS.filter((p) => p.status === "active" || p.id === selectedId);
  let out = `<option value="">— Select project —</option>`;
  out += active.map((p) => `<option value="${p.id}"${p.id === selectedId ? " selected" : ""}>${esc(projLabel(p))}${p.status === "archived" ? " (archived)" : ""}</option>`).join("");
  if (!selectedId && legacyText && legacyText.trim()) {
    out += `<option value="" selected disabled>${esc(legacyText.trim())} — not linked, please pick</option>`;
  }
  return out;
}

function mondayOf(d) {
  const t = new Date(d + "T00:00:00");
  const day = (t.getDay() + 6) % 7; // Mon=0
  t.setDate(t.getDate() - day);
  return t.toISOString().slice(0, 10);
}
function addDays(iso, n) { const t = new Date(iso + "T00:00:00"); t.setDate(t.getDate() + n); return t.toISOString().slice(0, 10); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) { if (!iso) return "—"; const [y, m, d] = iso.split("-"); return `${m}/${d}/${y.slice(2)}`; }
function fmtMonthDay(iso) { if (!iso) return "—"; const [, m, d] = iso.split("-"); return `${Number(m)}/${Number(d)}`; }
function weekLabel(ws) { return `Week of ${fmtDate(ws)}`; }
function weekRange(ws) { return `${fmtDate(ws)} – ${fmtDate(addDays(ws, 6))}`; }

let toastTimer;
function ping(msg, bad) {
  const t = $("toast"); t.querySelector("span").textContent = msg;
  t.className = "toast show" + (bad ? " bad" : "");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => (t.className = "toast"), 2800);
}
function fail(e) { ping(typeof e === "string" ? e : (e?.message || "Something went wrong"), true); }

/* ---------- payroll math (weekly) ---------- */
/* Overtime is figured per WEEK (the unit of approval), never on the pooled
   total — 45 hrs one week + 35 the next is 5 hrs OT, not zero. Hourly only. */
function otConf(p) {
  return {
    on: p.ot_enabled !== false,
    threshold: Number(p.ot_threshold ?? 40),
    mult: Number(p.ot_multiplier ?? 1.5),
  };
}
function computePay(profile, sheets, reqs) {
  const rate = Number(profile.rate || 0);
  const { on, threshold, mult } = otConf(profile);
  let hours = 0, otHours = 0, gross = 0;

  sheets.forEach((ts) => {
    const wk = (ts.time_entries || []).reduce((a, e) => a + Number(e.hours || 0), 0);
    hours += wk;
    if (profile.pay_type === "hourly") {
      const ot = on ? Math.max(0, wk - threshold) : 0;
      otHours += ot;
      gross += (wk - ot) * rate + ot * rate * mult;
    }
  });
  if (profile.pay_type !== "hourly") gross = sheets.length * Number(profile.salary_per_period || 0);

  const tax = gross * (Number(profile.tax_pct || 0) / 100);
  const reimb = reqs.reduce((s, r) => s + Number(r.amount || 0), 0);
  return { hours, otHours, regHours: hours - otHours, gross, tax, reimb, net: gross - tax + reimb };
}

/* ============================================================
   AUTH
   ============================================================ */
async function boot() {
  if (!CFG.SUPABASE_URL || CFG.SUPABASE_URL.includes("YOUR-PROJECT")) {
    $("boot").innerHTML = '<div style="max-width:360px;text-align:center;color:var(--steel);font-size:14px;">Add your Supabase URL and anon key to <b>config.js</b>, then reload.</div>';
    return;
  }
  const { data } = await sb.auth.getSession();
  if (data.session) { await afterLogin(); }
  else { await showLogin(); }
}

async function showLogin() {
  $("boot").classList.add("hidden");
  $("app").classList.add("hidden");
  $("login").classList.remove("hidden");
  const sel = $("loginUser");
  sel.innerHTML = '<option>Loading…</option>';
  const { data, error } = await sb.rpc("list_usernames");
  if (error) { sel.innerHTML = '<option>Could not load accounts</option>'; return; }
  sel.innerHTML = (data || []).map((u) =>
    `<option value="${esc(u.username)}">${esc(firstName(u.display_name))}</option>`).join("");
}

async function doLogin() {
  const username = $("loginUser").value;
  const pin = $("loginPin").value.trim();
  const err = $("loginErr");
  err.classList.add("hidden");
  if (!username || !pin) { err.textContent = "Pick an account and enter your PIN."; err.classList.remove("hidden"); return; }
  const email = `${username}@${CFG.EMAIL_DOMAIN}`;
  $("loginBtn").disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pin });
  $("loginBtn").disabled = false;
  if (error) { err.textContent = "Wrong PIN, or account not found."; err.classList.remove("hidden"); return; }
  $("loginPin").value = "";
  await afterLogin();
}

async function afterLogin() {
  const { data: sess } = await sb.auth.getSession();
  const myId = sess.session.user.id;
  const { data: prof, error } = await sb.from("profiles").select("*").eq("id", myId).single();
  if (error || !prof) { await sb.auth.signOut(); return showLogin(); }
  ME = prof;
  await Promise.all([loadProjects(), loadCodes()]);
  TAB = ME.role === "admin" ? "approvals" : "week";
  WEEK = mondayOf(todayISO());
  $("boot").classList.add("hidden");
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("meName").textContent = ME.display_name;
  await render();
}

async function signOut() { await sb.auth.signOut(); ME = null; showLogin(); }

/* ---------- self-service PIN change (any signed-in user) ---------- */
function openPinChange() {
  const email = `${ME.username}@${CFG.EMAIL_DOMAIN}`;
  $("modal-root").innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="sec-title"><h2><span class="slash">/</span> Change PIN</h2></div>
        <p class="steel" style="font-size:14px;margin-top:0;">Optional — leave it as is if you'd rather not.</p>
        <label class="field"><div class="lbl">Current PIN</div>
          <input id="pc_old" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <label class="field"><div class="lbl">New PIN (4–8 digits)</div>
          <input id="pc_new" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <label class="field"><div class="lbl">Confirm new PIN</div>
          <input id="pc_new2" type="password" inputmode="numeric" placeholder="••••••" /></label>
        <div id="pc_err" class="err hidden"></div>
        <div style="display:flex;gap:10px;">
          <button class="btn" id="pc_save"><span>Update PIN</span></button>
          <button class="btn ghost" onclick="closeModal()"><span>Cancel</span></button>
        </div>
      </div>
    </div>`;
  $("pc_save").onclick = () => savePinChange(email);
}
async function savePinChange(email) {
  const oldPin = $("pc_old").value.trim();
  const newPin = $("pc_new").value.trim();
  const conf = $("pc_new2").value.trim();
  const err = $("pc_err"); const bad = (m) => { err.textContent = m; err.classList.remove("hidden"); };
  if (!/^\d{4,8}$/.test(newPin)) return bad("New PIN must be 4–8 digits.");
  if (newPin !== conf) return bad("New PINs don't match.");
  if (newPin === oldPin) return bad("New PIN is the same as the old one.");
  $("pc_save").disabled = true;
  // verify the current PIN by re-authenticating (updateUser doesn't check it)
  const { error: reauth } = await sb.auth.signInWithPassword({ email, password: oldPin });
  if (reauth) { $("pc_save").disabled = false; return bad("Current PIN is wrong."); }
  const { error } = await sb.auth.updateUser({ password: newPin });
  if (error) { $("pc_save").disabled = false; return bad(error.message); }
  closeModal(); ping("PIN updated");
}

/* ============================================================
   SHELL
   ============================================================ */
async function render() {
  const isAdmin = ME.role === "admin";
  const tabs = isAdmin
    ? [["approvals", "Approvals"], ["payroll", "Payroll"], ["reports", "Reports"], ["projects", "Projects"], ["codes", "Codes"], ["team", "Team"]]
    : [["week", "My Week"], ["requests", "Requests"], ["pay", "My Pay"]];

  let pending = 0;
  if (isAdmin) {
    const [{ count: a }, { count: b }, { count: c }] = await Promise.all([
      sb.from("timesheets").select("id", { count: "exact", head: true }).eq("status", "submitted"),
      sb.from("requests").select("id", { count: "exact", head: true }).eq("status", "submitted"),
      sb.from("change_requests").select("id", { count: "exact", head: true }).eq("status", "submitted"),
    ]);
    pending = (a || 0) + (b || 0) + (c || 0);
  }

  $("tabs").innerHTML = tabs.map(([id, label]) => {
    const badge = isAdmin && id === "approvals" && pending > 0 ? `<span class="badge">${pending}</span>` : "";
    return `<button class="tab ${TAB === id ? "active" : ""}" onclick="go('${id}')">${label}${badge}</button>`;
  }).join("");

  const v = $("view");
  v.innerHTML = skeleton();
  try {
    if (TAB === "week") await viewWeek(v);
    else if (TAB === "requests") await viewRequests(v);
    else if (TAB === "pay") await viewPay(v);
    else if (TAB === "approvals") await viewApprovals(v);
    else if (TAB === "payroll") await viewPayroll(v);
    else if (TAB === "reports") await viewReports(v);
    else if (TAB === "projects") await viewProjects(v);
    else if (TAB === "codes") await viewCodes(v);
    else if (TAB === "team") await viewTeam(v);
  } catch (e) { fail(e); v.innerHTML = `<div class="banner bad">Could not load this view. ${esc(e.message || "")}</div>`; }
}
function go(id) { TAB = id; render(); }

function chip(s) { const m = { draft: "DRAFT", submitted: "SUBMITTED", approved: "APPROVED", declined: "DECLINED", paid: "PAID" }; return `<span class="chip ${s}"><span>${m[s] || s}</span></span>`; }
function sec(t, right) { return `<div class="sec-title"><h2><span class="slash">/</span> ${t}</h2>${right || ""}</div>`; }
function emptyBox(t) { return `<div class="empty">${t}</div>`; }
function skeleton() {
  const bars = (w) => `<div class="skel skel-line" style="width:${w}%"></div>`;
  const card = `<div class="skelcard">${bars(40)}${bars(90)}${bars(70)}</div>`;
  return `<div class="statbar">${[1,2,3].map(()=>`<div class="stat"><div class="skel skel-line" style="width:55%"></div><div class="skel skel-line" style="width:35%;height:22px"></div></div>`).join("")}</div>${card}${card}`;
}
function statCards(items) {
  return `<div class="statbar">${items.map((s)=>`
    <div class="stat ${s.accent||""}">
      <div class="k">${s.k}</div>
      <div class="v ${s.small?"small":""}">${s.v}</div>
      ${s.sub?`<div class="sub">${s.sub}</div>`:""}
    </div>`).join("")}</div>`;
}

/* ============================================================
   EMPLOYEE — MY WEEK
   ============================================================ */
async function loadWeek(ws) {
  const { data, error } = await sb.from("timesheets")
    .select("*, time_entries(*), change_requests(*)")
    .eq("user_id", ME.id).eq("week_start", ws).maybeSingle();
  if (error) throw error;
  return data; // null if no sheet yet
}
async function ensureSheet(ws) {
  let sheet = await loadWeek(ws);
  if (sheet) return sheet;
  const { data, error } = await sb.from("timesheets").insert({ user_id: ME.id, week_start: ws }).select("*, time_entries(*), change_requests(*)").single();
  if (error) throw error;
  return data;
}

async function viewWeek(v) {
  const sheet = await loadWeek(WEEK);
  const status = sheet ? sheet.status : "draft";
  const locked = sheet ? sheet.locked : false;
  const entries = sheet ? (sheet.time_entries || []) : [];
  const openCR = sheet ? (sheet.change_requests || []).find((c) => c.status === "submitted") : null;

  const isThisWeek = WEEK === mondayOf(todayISO());
  const editable = !locked && (status === "draft" || status === "declined");
  const totalHrs = entries.reduce((a, e) => a + Number(e.hours || 0), 0);

  let banner = "";
  const bannerKey = sheet ? `week-banner-${sheet.id}-${status}-${sheet.updated_at || ""}` : "";
  const bannerDismissed = bannerKey && sessionStorage.getItem(bannerKey) === "1";
  const dismissButton = bannerKey ? `<button type="button" class="banner-dismiss" onclick="dismissWeekBanner('${bannerKey}', this)" aria-label="Dismiss message"><span class="xmark">×</span>Dismiss</button>` : "";
  if (!bannerDismissed) {
    if (status === "declined") banner = `<div class="banner bad dismissible"><div><b>Sent back.</b> ${esc(sheet.decline_reason || "Please review and resubmit.")}</div>${dismissButton}</div>`;
    else if (status === "submitted") banner = `<div class="banner warn dismissible"><div><b>Submitted.</b> Waiting on admin approval — no edits until it's reviewed.</div>${dismissButton}</div>`;
    else if (status === "approved" && openCR) banner = `<div class="banner warn dismissible"><div><b>Change requested.</b> Your amendment is waiting on admin. The week stays locked until then.</div>${dismissButton}</div>`;
    else if (status === "approved") banner = `<div class="banner good dismissible"><div><b>Approved${sheet.paid ? " · paid" : ""}.</b> Locked. Use “Request change” if something needs fixing.</div>${dismissButton}</div>`;
  }

  const byDay = {};
  WEEK_ENTRIES.clear();
  entries.forEach((e) => { (byDay[e.work_date] = byDay[e.work_date] || []).push(e); WEEK_ENTRIES.set(String(e.id), e); });
  const todayStr = todayISO();
  const weekEnd = addDays(WEEK, 6);
  const defaultDay = todayStr >= WEEK && todayStr <= weekEnd ? todayStr : WEEK;
  if (!ACTIVE_DAY || ACTIVE_DAY < WEEK || ACTIVE_DAY > weekEnd) ACTIVE_DAY = defaultDay;

  // On first visit to a week, open the first line for the selected day and keep all others collapsed.
  if (editable && AUTO_EXPANDED_WEEK !== WEEK && EXPANDED_ENTRIES.size === 0) {
    const first = (byDay[ACTIVE_DAY] || [])[0];
    if (first) EXPANDED_ENTRIES.add(String(first.id));
    AUTO_EXPANDED_WEEK = WEEK;
  }

  let cols = "";
  for (let i = 0; i < 7; i++) {
    const d = addDays(WEEK, i);
    const list = (byDay[d] || []).sort((a, b) => a.created_at < b.created_at ? -1 : 1);
    const dayTotal = list.reduce((a, e) => a + Number(e.hours || 0), 0);
    const target = i < 5 ? 8 : 0;
    const remaining = target ? Math.max(0, target - dayTotal) : 0;
    const weekend = i >= 5 ? " weekend" : "";
    const isToday = d === todayStr ? " today" : "";

    const cards = list.map((e) => {
      const expanded = EXPANDED_ENTRIES.has(String(e.id));
      const projText = projDisplay(e);
      const projectLabel = esc(projText || "No project");
      const projMissing = !projText;
      const noteLabel = e.notes && e.notes.trim() ? esc(e.notes) : "Notes required";
      if (!editable) return `
      <div class="linecard lineread">
        <div class="p">${projectLabel} <span class="h">${e.hours} hrs</span></div>
        <div class="n">${esc(e.notes)}</div>
      </div>`;
      return `
      <div class="entrycard${expanded ? " open" : ""}" data-id="${e.id}" id="entry-${e.id}">
        <div class="entrysummary">
          <button type="button" class="entry-toggle" onclick="toggleEntry('${e.id}')" aria-expanded="${expanded}" aria-controls="edit-${e.id}">
            <span class="entry-main">
              <span class="entry-project${projMissing ? " missing" : ""}">${projectLabel}</span>
              ${codeDisplay(e) ? `<span class="codechip">${esc(codeDisplay(e))}</span>` : `<span class="codechip missing">no work type</span>`}
              <span class="entry-note${e.notes && e.notes.trim() ? "" : " missing"}">${noteLabel}</span>
            </span>
            <span class="entry-hours">${e.hours} hrs</span>
            <span class="entry-chevron" aria-hidden="true">⌄</span>
          </button>
          <button type="button" class="entry-menu-btn" onclick="toggleEntryMenu(event,'${e.id}')" aria-haspopup="menu" aria-expanded="false" aria-controls="entry-menu-${e.id}" aria-label="Entry options">⋮</button>
          <div class="entry-menu hidden" id="entry-menu-${e.id}" role="menu">
            <button type="button" role="menuitem" onclick="focusEntryProject('${e.id}')">Change project</button>
            <button type="button" role="menuitem" onclick="duplicateEntry('${e.id}')">Duplicate</button>
            <button type="button" role="menuitem" class="danger" onclick="delEntry('${e.id}')">Delete</button>
          </div>
        </div>
        <div class="entryedit" id="edit-${e.id}">
          <label class="field"><div class="lbl">Project</div><select class="proj-select" onchange="editEntry('${e.id}','project_id',this.value)">${projectOptions(e.project_id, e.project)}</select></label>
          <label class="field"><div class="lbl">Work type</div><select class="proj-select" onchange="editEntry('${e.id}','charge_code_id',this.value)">${codeOptions(e.charge_code_id)}</select></label>
          <label class="field"><div class="lbl">Hours</div><div class="hours-wrap"><input aria-label="Hours" type="number" min="0.25" max="24" step="0.25" value="${e.hours}" onchange="editEntry('${e.id}','hours',this.value)" title="Hours (0.25 = 15 min)" /><span class="hours-unit">hrs</span></div></label>
          <label class="field"><div class="lbl">Notes</div><textarea placeholder="What work was completed?" onchange="editEntry('${e.id}','notes',this.value)">${esc(e.notes)}</textarea></label>
          <div class="entry-actions">
            <button type="button" class="entry-done" onclick="toggleEntry('${e.id}', false)">Done</button>
          </div>
          <div class="savemark" data-save-for="${e.id}" id="st-${e.id}"></div>
        </div>
      </div>`;
    }).join("");

    const body = (cards || `<div class="day-empty">No time logged</div>`)
      + (editable ? `<button type="button" class="addline" onclick="addEntry('${d}')">+ Add line</button>` : "");
    const progressText = target
      ? dayTotal >= target ? (dayTotal > target ? `${dayTotal - target} hr overtime` : "Day complete") : `${remaining} hrs remaining`
      : dayTotal ? `${dayTotal} hrs logged` : "No time logged";

    cols += `<div class="daycol${weekend}${isToday}${ACTIVE_DAY === d ? " active-day" : ""}" data-work-date="${d}">
      <h4>
        <span class="day-title">${DAYS[i]}${isToday ? ` · Today` : ""}</span>
        <span class="dt">${fmtDate(d)}</span>
        <span class="day-progress"><span class="tot">${target ? `${dayTotal} / ${target} hrs` : `${dayTotal} hrs`}</span><span class="remaining${target && dayTotal >= target ? " complete" : ""}">${progressText}</span></span>
      </h4>
      <div class="daybody">${body}</div>
    </div>`;
  }

  const picker = Array.from({length:7}, (_, i) => {
    const d = addDays(WEEK, i);
    const list = byDay[d] || [];
    const dayTotal = list.reduce((a, e) => a + Number(e.hours || 0), 0);
    const target = i < 5 ? 8 : 0;
    const isToday = d === todayStr;
    const hasIssue = list.some((e) => !e.project?.trim() || !e.notes?.trim() || !(Number(e.hours) > 0));
    let statusText = "0 hrs";
    let statusClass = "";
    if (hasIssue) { statusText = "Incomplete"; statusClass = "issue"; }
    else if (target && dayTotal >= target) { statusText = `${dayTotal} hrs ✓`; statusClass = "complete"; }
    else if (dayTotal > 0) { statusText = `${dayTotal} hrs`; statusClass = "partial"; }

      <div class="weeknav">

              <span class="week-menu-icon" aria-hidden="true">${isThisWeek ? "✓" : "●"}</span>
              <span class="week-menu-label">This week</span>
              <span class="week-menu-range">${weekRange(currentWeekStart)}</span>
            </button>
            <button type="button" class="week-menu-item" role="menuitem" onclick="chooseWeek(1)" ${isThisWeek ? "disabled" : ""}>

function toggleEntry(id, forceOpen) {
  id = String(id);
  if (isDesktop() && forceOpen !== false) { closeEntryMenus(); openEntryEditor(id); return; }
  const card = document.getElementById("entry-" + id);
  const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : !EXPANDED_ENTRIES.has(id);
  closeEntryMenus();
  if (shouldOpen) {
    EXPANDED_ENTRIES.clear();
    EXPANDED_ENTRIES.add(id);
  } else EXPANDED_ENTRIES.delete(id);
  document.querySelectorAll(".entrycard.open").forEach((other) => {
    if (other.id !== "entry-" + id) {
      other.classList.remove("open");
      other.querySelector(".entry-toggle")?.setAttribute("aria-expanded", "false");
    }
  });
  if (card) {
    card.classList.toggle("open", shouldOpen);
    card.querySelector(".entry-toggle")?.setAttribute("aria-expanded", String(shouldOpen));
  }
}

function syncDayUI(dateISO) {
  document.querySelectorAll("[data-day-pick]").forEach((b) => b.classList.toggle("on", b.dataset.dayPick === dateISO));
  document.querySelectorAll(".daycol").forEach((c) => c.classList.toggle("active-day", c.dataset.workDate === dateISO));

function goToDay(dateISO) {

  ACTIVE_DAY = dateISO;

    entry.classList.remove("open");

let saveFade = {};
let globalSaveFade;
function markSaved(id, state) {
  const els = [...document.querySelectorAll(`[data-save-for="${id}"]`)];
  const global = $("global-save-state");
  clearTimeout(saveFade[id]);
  clearTimeout(globalSaveFade);
  if (state === "saving") {
    els.forEach((el) => { el.textContent = "Saving…"; el.className = "savemark saving show"; });
    if (global) { global.textContent = "Saving…"; global.className = "global-save-state saving show"; }
    return;
  }
  els.forEach((el) => { el.textContent = "✓ Saved"; el.className = "savemark show"; });
  if (global) { global.textContent = "✓ Saved"; global.className = "global-save-state show"; }
  saveFade[id] = setTimeout(() => els.forEach((el) => (el.className = "savemark")), 1600);
  globalSaveFade = setTimeout(() => { if (global) global.className = "global-save-state"; }, 1600);
}

async function addEntry(dateISO) {

    const sheet = await ensureSheet(WEEK);
    const { data, error } = await sb.from("time_entries").insert({ timesheet_id: sheet.id, work_date: dateISO, project: "", project_id: LAST_PROJECT_ID || null, charge_code_id: LAST_CODE_ID || defaultCodeId(), hours: 1, notes: "" }).select("id").single();

    EXPANDED_ENTRIES.clear();
    if (data?.id) EXPANDED_ENTRIES.add(String(data.id));
    await render();
  } catch (e) { fail(e); }
}
async function editEntry(id, field, value) {
  let payload = {};
  if (field === "hours") {
    let h = Number(value);
    h = Math.round(h * 4) / 4;               // snap to 15-min
    if (!(h > 0) || h > 24) return fail("Hours must be 0.25–24, in 15-minute steps.");
    payload.hours = h;
  } else if (field === "charge_code_id") {
    payload.charge_code_id = value || null;
    LAST_CODE_ID = value || null;
  } else if (field === "project_id") {
    const pr = value ? PROJ.get(value) : null;
    payload.project_id = value || null;
    payload.project = pr ? pr.name : "";   // snapshot the name as it was chosen
    LAST_PROJECT_ID = value || null;       // next new line prefills to this
  } else payload[field] = value;
  markSaved(id, "saving");
  const p = sb.from("time_entries").update(payload).eq("id", id);
  PENDING_SAVES.add(p);
  const { error } = await p;
  PENDING_SAVES.delete(p);
  if (error) { fail(error); return render(); }
  const cached = WEEK_ENTRIES.get(String(id));
  if (cached) Object.assign(cached, payload);
  if (field === "hours" || field === "project_id" || field === "charge_code_id") { await render(); markSaved(id); } // refresh totals / labels
  else markSaved(id);
}

        <div class="row" style="justify-content:flex-end;">
          <button class="btn ghost" type="button" onclick="closeModal()"><span>Keep editing</span></button>

async function submitWeek() {
  const sheet = await loadWeek(WEEK);
  if (!sheet) return;
  const entries = sheet.time_entries || [];
  if (entries.length === 0) return fail("Add at least one line before submitting.");
  const noProject = entries.find((e) => !e.project_id && !(e.project || "").trim());
  if (noProject) return fail("Every line needs a project before you can submit.");
  const noCode = entries.find((e) => !e.charge_code_id);
  if (noCode) return fail("Every line needs a work type before you can submit.");
  const bad = entries.find((e) => !e.notes || !e.notes.trim());
  if (bad) return fail("Every line needs a note before you can submit.");
  const { error } = await sb.from("timesheets").update({ status: "submitted" }).eq("id", sheet.id);
  if (error) return fail(error);
  closeModal();
  ping("Week submitted for approval");
  render();
}

/* A request can be edited or withdrawn right up until your admin decides.
   After that it's a record of a decision, so it stops being yours to change. */
function editRequest(r) {

async function saveRequest(id) {

async function cancelRequest(id) {

/* Per diem has no receipt; reimbursement does. */
function receiptTag(r) {
  const n = (r.receipt_paths || []).length;
  if (n > 0) return `<button type="button" class="receipt-tag has" onclick="viewReceipts('${r.id}')"><span class="cam">⧉</span> ${n} receipt${n > 1 ? "s" : ""} — view</button>`;
  if (r.type === "perdiem") return "";
  return `<span class="receipt-tag none"><span class="cam">!</span> No receipt attached</span>`;
}
async function viewReceipts(reqId) {
  const { data, error } = await sb.from("requests").select("receipt_paths, notes").eq("id", reqId).single();
  if (error) return fail(error);
  const urls = await receiptUrls(data.receipt_paths);
  if (!urls.length) return fail("Could not load the receipt photos.");

    <button class="btn ghost" onclick="closeModal()"><span>Close</span></button>
  </div></div>`;
}

/* ---------- receipt staging (kept in memory until submit) ---------- */
function stageReceipts(fileList) {
  for (const f of [...(fileList || [])]) {
    if (!f.type.startsWith("image/")) { fail("Only image files can be attached."); continue; }
    if (f.size > 10 * 1024 * 1024) { fail(`${f.name} is over 10 MB — take a smaller photo.`); continue; }
    RECEIPTS.push({ id: uid(), file: f, url: URL.createObjectURL(f) });
  }
  $("r_files").value = "";
  if (RECEIPTS.length) {
    RECEIPT_WARNED = false;
    $("r_receipt_note")?.classList.add("hidden");
    const s = $("r_submit")?.querySelector("span");
    if (s) s.textContent = "Submit request";
  }
  renderReceiptThumbs();
}
function removeReceipt(id) {
  const i = RECEIPTS.findIndex((r) => r.id === id);
  if (i > -1) { URL.revokeObjectURL(RECEIPTS[i].url); RECEIPTS.splice(i, 1); }
  renderReceiptThumbs();
}
function renderReceiptThumbs() {
  const box = $("r_thumbs");
  if (!box) return;
  box.innerHTML = RECEIPTS.map((r) => `
    <div class="rthumb">
      <img src="${r.url}" alt="Receipt preview" />
      <button type="button" class="rthumb-x" onclick="removeReceipt('${r.id}')" aria-label="Remove photo">×</button>
    </div>`).join("");
}
async function uploadReceipts() {
  const paths = [];
  for (const r of RECEIPTS) {
    const ext = (r.file.name.split(".").pop() || "jpg").toLowerCase().slice(0, 5);
    const path = `${ME.id}/${uid()}.${ext}`;
    const { error } = await sb.storage.from("receipts").upload(path, r.file, { contentType: r.file.type, upsert: false });
    if (error) throw new Error("Receipt upload failed: " + error.message);
    paths.push(path);
  }
  return paths;
}
function clearReceipts() {
  RECEIPTS.forEach((r) => URL.revokeObjectURL(r.url));
  RECEIPTS = [];
}
/* Signed URLs keep the private bucket private. */
async function receiptUrls(paths) {
  if (!paths || !paths.length) return [];
  const { data, error } = await sb.storage.from("receipts").createSignedUrls(paths, 3600);
  if (error) return [];
  return (data || []).filter((d) => d.signedUrl).map((d) => d.signedUrl);
}

function setReqType(t) { REQ_TYPE = t; RECEIPT_WARNED = false; render(); }
async function submitReq() {
  const req_date = $("r_date").value, amount = Number($("r_amount").value), notes = $("r_notes").value.trim();
  const err = $("r_err"), note = $("r_receipt_note");
  const bad = (m) => { err.textContent = m; err.classList.remove("hidden"); };
  err.classList.add("hidden");
  if (!req_date) return bad("Pick a date.");
  if (!amount || amount <= 0) return bad("Enter a valid amount.");
  if (!notes) return bad("Notes are required — what is this for?");

  // Receipts are expected, not enforced: say so once, on the attempt that lacks
  // one, then let the next press through.
  if (REQ_TYPE === "reimbursement" && RECEIPTS.length === 0 && !RECEIPT_WARNED) {
    RECEIPT_WARNED = true;
    note?.classList.remove("hidden");
    note?.scrollIntoView({ behavior: "smooth", block: "nearest" });
    $("r_submit").querySelector("span").textContent = "Submit without receipt";
    return;
  }

  const btn = $("r_submit");
  btn.disabled = true;
  try {
    const receipt_paths = await uploadReceipts();
    const { error } = await sb.from("requests").insert({ user_id: ME.id, type: REQ_TYPE, req_date, amount, notes, receipt_paths });
    if (error) throw error;
    clearReceipts();
    RECEIPT_WARNED = false;
    ping((REQ_TYPE === "perdiem" ? "Per diem" : "Reimbursement") + " submitted");
    render();
  } catch (e) { btn.disabled = false; fail(e); }
}

   someone's rate or tax rate can't quietly rewrite a check already issued. */
async function openStub(runId) {
  const { data: r, error } = await sb.from("pay_runs").select("*").eq("id", runId).single();
  if (error) return fail(error);
  const [{ data: weeks }, { data: reqs }] = await Promise.all([
    sb.from("timesheets").select("week_start, time_entries(hours)").eq("pay_run_id", runId).order("week_start"),
    sb.from("requests").select("*").eq("pay_run_id", runId).order("req_date"),
